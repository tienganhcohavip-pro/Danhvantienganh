<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Vowel e /e/ - Phonics World for Kids</title>
    <style>
        /* --- 1. THIẾT KẾ GIAO DIỆN CHUẨN TIỂU HỌC --- */
        :root {
            --primary-bg: #F3F9FF;
            --header-bg: #FFEFA6;
            --text-color: #333;
            --vowel-color: #FF4949; /* Đỏ rực rỡ để kích thích nhận diện mặt chữ */
            --word-tab-color: #6BCB77;
            --sentence-tab-color: #4D96FF;
            --btn-sentence-audio: #FF9F43;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            padding-bottom: 50px;
        }

        /* Header đáng yêu */
        header {
            background-color: var(--header-bg);
            padding: 20px 15px;
            text-align: center;
            border-bottom-right-radius: 30px;
            border-bottom-left-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        header h1 {
            font-size: 2.2rem;
            color: #FF6B6B;
            margin-bottom: 5px;
        }

        header p {
            font-size: 1.1rem;
            color: #4D96FF;
            font-weight: 600;
        }

        /* Thanh điều hướng Tabs */
        .tab-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px auto;
            max-width: 500px;
            padding: 0 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid #BDD7EE;
            border-radius: 16px;
            background-color: #E1EDF9;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active-words {
            background-color: var(--word-tab-color);
            color: white;
            border-color: #5bb366;
            box-shadow: 0 4px 12px rgba(107, 203, 119, 0.3);
        }

        .tab-btn.active-sentences {
            background-color: var(--sentence-tab-color);
            color: white;
            border-color: #3b82eb;
            box-shadow: 0 4px 12px rgba(77, 150, 255, 0.3);
        }

        /* Vùng nội dung bài học */
        .content-section {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .content-section.active {
            display: block;
        }

        /* --- 2. LAYOUT TỪ VỰNG (WORDS GRID) --- */
        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .word-card {
            background: white;
            border: 3px solid #E2ECEF;
            border-radius: 24px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .word-card:hover {
            transform: translateY(-5px);
        }

        .word-card.playing {
            border-color: #FF6B6B;
            background-color: #FFF0F0;
            animation: pulse 1s infinite alternate;
        }

        .word-card img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .word-text {
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Highlight chữ e mục tiêu */
        .letter-e {
            color: var(--vowel-color);
            font-weight: 800;
        }

        .ipa-text {
            font-size: 0.95rem;
            color: #777;
            font-style: italic;
            margin: 3px 0 6px 0;
        }

        .meaning-text {
            font-size: 1rem;
            color: #666;
            font-weight: 500;
        }

        .speaker-badge {
            display: inline-block;
            margin-top: 10px;
            background-color: #F0F0F0;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        /* --- 3. LAYOUT LUYỆN ĐỌC CÂU (SENTENCES) --- */
        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sentence-card {
            background: white;
            border: 3px solid #DFF6FF;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        /* Nút phát âm thanh cả câu */
        .play-sentence-btn {
            background-color: var(--btn-sentence-audio);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background-color 0.2s;
        }

        .play-sentence-btn.playing {
            background-color: var(--word-tab-color);
        }

        /* Hàng chữ chứa các từ tương tác rải rác */
        .sentence-words-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px 10px;
            margin: 15px 0;
        }

        .interactive-word {
            display: inline-block;
            padding: 6px 12px;
            font-size: 1.4rem;
            font-weight: 600;
            background-color: #F5F5F5;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.1s ease;
            user-select: none;
        }

        .interactive-word:active {
            transform: scale(0.95);
        }

        /* Highlight khối từ chứa vần e ngắn */
        .word-has-e {
            background-color: #FFE3E3;
            border: 1px solid #FFB3B3;
        }

        .sentence-meaning {
            font-size: 1.05rem;
            color: #888;
            font-style: italic;
            margin-top: 10px;
        }

        /* Hiệu ứng nhịp đập khi đang phát âm thanh */
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Short Vowel e /e/</h1>
        <p>Let's learn the short "e" sound! 🌟</p>
    </header>

    <div class="tab-container">
        <button class="tab-btn active-words" id="tabWords" onclick="switchTab('words')">🔤 Words</button>
        <button class="tab-btn" id="tabSentences" onclick="switchTab('sentences')">📖 Sentences</button>
    </div>

    <section id="sectionWords" class="content-section active">
        <div class="words-grid" id="wordsGrid">
            </div>
    </section>

    <section id="sectionSentences" class="content-section">
        <div class="sentence-list" id="sentencesList">
            </div>
    </section>

    <script>
        // 1. Khởi tạo đối tượng âm thanh toàn cục giúp chống trùng lặp âm thanh khi bé bấm liên tục
        let currentAudio = null;

        // 2. Cơ sở dữ liệu cấu trúc đồng nhất (Dựa theo Oxford Phonics World)
        const lessonData = {
            vowel: "e",
            words: [
                { id: "w1", word: "egg", ipa: "/eɡ/", meaning: "quả trứng", image: "https://placehold.co/150x150/fdf3cd/ff6b6b?text=egg", audio: "audios/words/egg.mp3" },
                { id: "w2", word: "vet", ipa: "/vet/", meaning: "bác sĩ thú y", image: "https://placehold.co/150x150/fdf3cd/ff6b6b?text=vet", audio: "audios/words/vet.mp3" },
                { id: "w3", word: "ten", ipa: "/ten/", meaning: "số 10", image: "https://placehold.co/150x150/fdf3cd/ff6b6b?text=ten", audio: "audios/words/ten.mp3" },
                { id: "w4", word: "web", ipa: "/web/", meaning: "mạng nhện", image: "https://placehold.co/150x150/fdf3cd/ff6b6b?text=web", audio: "audios/words/web.mp3" },
                { id: "w5", word: "jet", ipa: "/dʒet/", meaning: "máy bay phản lực", image: "https://placehold.co/150x150/e1edf9/4d96ff?text=jet", audio: "audios/words/jet.mp3" },
                { id: "w6", word: "net", ipa: "/net/", meaning: "cái lưới", image: "https://placehold.co/150x150/e1edf9/4d96ff?text=net", audio: "audios/words/net.mp3" },
                { id: "w7", word: "wet", ipa: "/wet/", meaning: "bị ướt", image: "https://placehold.co/150x150/e1edf9/4d96ff?text=wet", audio: "audios/words/wet.mp3" },
                { id: "w8", word: "hen", ipa: "/hen/", meaning: "con gà mái", image: "https://placehold.co/150x150/e8f5e9/6bcb77?text=hen", audio: "audios/words/hen.mp3" },
                { id: "w9", word: "pen", ipa: "/pen/", meaning: "cái bút mực", image: "https://placehold.co/150x150/e8f5e9/6bcb77?text=pen", audio: "audios/words/pen.mp3" },
                { id: "w10", word: "red", ipa: "/red/", meaning: "màu đỏ", image: "https://placehold.co/150x150/ffe3e3/ff4949?text=red", audio: "audios/words/red.mp3" },
                { id: "w11", word: "bed", ipa: "/bed/", meaning: "cái giường", image: "https://placehold.co/150x150/ffe3e3/ff4949?text=bed", audio: "audios/words/bed.mp3" }
            ],
            sentences: [
                {
                    id: "s1",
                    sentence: "The red hen is on the bed.",
                    highlightWords: ["red", "hen", "bed"],
                    meaning: "Con gà mái màu đỏ đang ở trên giường.",
                    audioSentence: "audios/sentences/sentence_e1.mp3",
                    wordAudioMap: {
                        "The": "audios/words/the.mp3", "red": "audios/words/red.mp3", "hen": "audios/words/hen.mp3",
                        "is": "audios/words/is.mp3", "on": "audios/words/on.mp3", "the": "audios/words/the.mp3", "bed.": "audios/words/bed.mp3"
                    }
                },
                {
                    id: "s2",
                    sentence: "The vet has ten big eggs.",
                    highlightWords: ["vet", "ten", "eggs"],
                    meaning: "Bác sĩ thú y có mười quả trứng lớn.",
                    audioSentence: "audios/sentences/sentence_e2.mp3",
                    wordAudioMap: {
                        "The": "audios/words/the.mp3", "vet": "audios/words/vet.mp3", "has": "audios/words/has.mp3",
                        "ten": "audios/words/ten.mp3", "big": "audios/words/big.mp3", "eggs.": "audios/words/egg.mp3"
                    }
                },
                {
                    id: "s3",
                    sentence: "I see a jet and a net on the web.",
                    highlightWords: ["jet", "net", "web"],
                    meaning: "Tớ nhìn thấy một chiếc máy bay phản lực và một cái lưới ở trên mạng nhện.",
                    audioSentence: "audios/sentences/sentence_e3.mp3",
                    wordAudioMap: {
                        "I": "audios/words/i.mp3", "see": "audios/words/see.mp3", "a": "audios/words/a.mp3",
                        "jet": "audios/words/jet.mp3", "and": "audios/words/and.mp3", "net": "audios/words/net.mp3",
                        "on": "audios/words/on.mp3", "the": "audios/words/the.mp3", "web.": "audios/words/web.mp3"
                    }
                }
            ]
        };

        // 3. Hàm phát âm thanh cốt lõi (Có xử lý hiệu ứng CSS kèm theo)
        function playAudio(audioUrl, elementToVisual, activeClass) {
            if (currentAudio) {
                currentAudio.pause();
                document.querySelectorAll('.word-card, .play-sentence-btn').forEach(el => el.classList.remove('playing'));
            }

            // Để chạy thử độc lập khi chưa có file, hệ thống sẽ báo log thay vì crash ứng dụng
            currentAudio = new Audio(audioUrl);
            if (elementToVisual) elementToVisual.classList.add(activeClass);

            currentAudio.play().catch(err => {
                console.log("Audio đang trỏ tới đường dẫn ảo: " + audioUrl + ". Bạn hãy cấu hình tệp âm thanh thực tế nhé!");
                // Giả lập tắt hiệu ứng sau 1.2 giây nếu không tìm thấy file audio thật
                setTimeout(() => { if (elementToVisual) elementToVisual.classList.remove(activeClass); }, 1200);
            });

            currentAudio.onended = () => {
                if (elementToVisual) elementToVisual.classList.remove(activeClass);
            };
        }

        // 4. Helper hàm giúp biến đổi chuỗi chữ, bọc thẻ riêng cho chữ 'e' hoặc 'E'
        function highlightVowelE(word) {
            return word.split('').map(char => {
                return char.toLowerCase() === 'e' ? `<span class="letter-e">${char}</span>` : char;
            }).join('');
        }

        // 5. Render phần tab từ vựng lên màn hình
        function renderWords() {
            const grid = document.getElementById('wordsGrid');
            grid.innerHTML = lessonData.words.map(item => `
                <div class="word-card" id="card-${item.id}" onclick="playAudio('${item.audio}', this, 'playing')">
                    <img src="${item.image}" alt="${item.word}">
                    <div class="word-text">${highlightVowelE(item.word)}</div>
                    <div class="ipa-text">${item.ipa}</div>
                    <div class="meaning-text">${item.meaning}</div>
                    <div class="speaker-badge">🔊 Listen</div>
                </div>
            `).join('');
        }

        // 6. Render phần luyện đọc câu đa điểm tương tác từng từ
        function renderSentences() {
            const list = document.getElementById('sentencesList');
            
            list.innerHTML = lessonData.sentences.map(item => {
                const wordsArray = item.sentence.split(' ');
                
                // Duyệt qua từng từ đơn lẻ trong câu để gắn sự kiện bấm phát âm thanh riêng biệt
                const wordsRowHtml = wordsArray.map(word => {
                    const cleanWord = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "").toLowerCase();
                    const isTargetWord = item.highlightWords.includes(cleanWord);
                    const classList = isTargetWord ? 'interactive-word word-has-e' : 'interactive-word';
                    const audioUrl = item.wordAudioMap[word] || item.wordAudioMap[cleanWord] || '';

                    return `
                        <span class="${classList}" onclick="event.stopPropagation(); playAudio('${audioUrl}', null, null)">
                            ${highlightVowelE(word)}
                        </span>
                    `;
                }).join('');

                return `
                    <div class="sentence-card">
                        <button class="play-sentence-btn" onclick="playAudio('${item.audioSentence}', this, 'playing')">
                            🔊 Listen Whole Sentence
                        </button>
                        <div class="sentence-words-row">${wordsRowHtml}</div>
                        <div class="sentence-meaning">${item.meaning}</div>
                    </div>
                `;
            }).join('');
        }

        // 7. Hàm chuyển đổi qua lại giữa Tab Từ vựng và Tab Câu
        function switchTab(tabType) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.className = 'tab-btn');

            if (tabType === 'words') {
                document.getElementById('sectionWords').classList.add('active');
                document.getElementById('tabWords').classList.add('active-words');
            } else {
                document.getElementById('sectionSentences').classList.add('active');
                document.getElementById('tabSentences').classList.add('active-sentences');
            }
            if (currentAudio) currentAudio.pause();
        }

        // Khởi động render dữ liệu khi trang web được tải xong
        window.onload = () => {
            renderWords();
            renderSentences();
        };
    </script>
</body>
</html>
