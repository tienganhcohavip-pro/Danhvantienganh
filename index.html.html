<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiếng Anh Cô Hà - Phonics World</title>
    <!-- Nhúng font chữ mềm mại nghệ thuật cho thương hiệu và font chữ dễ đọc cho bài học -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Fredoka+One&family=Pacifico&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --warning: #FFE66D;
            --accent: #FF9F43;
            --text-color: #2F3E46;
            --bg-color: #F0F7F4;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Khu vực thương hiệu góc trên bên phải */
        .brand-box {
            position: absolute;
            top: 20px;
            right: 30px;
            text-align: center; /* Căn giữa dòng dưới so với dòng trên */
            background: rgba(255, 255, 255, 0.85);
            padding: 10px 15px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px dashed var(--secondary);
            z-index: 10;
        }

        .brand-top {
            font-family: 'Pacifico', cursive;
            color: var(--primary);
            font-size: 1.25rem;
            margin: 0;
            white-space: nowrap;
        }

        .brand-bottom {
            font-family: 'Dancing Script', cursive;
            color: #4a4a4a;
            font-size: 1.1rem;
            margin: 3px 0 0 0;
            display: block; /* Đảm bảo xuống dòng để tính năng căn giữa hoạt động */
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.06);
            border: 5px solid var(--secondary);
            margin-top: 80px; /* Tránh đè lên phần thương hiệu trên mobile */
            position: relative;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: var(--primary);
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        
        .sub-title {
            text-align: center;
            color: #6c757d;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .section-header {
            background: var(--warning);
            padding: 12px 25px;
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.2rem;
            margin-top: 25px;
            box-shadow: 0 4px 0 #E6CE56;
        }

        /* Lưới thẻ từ vựng Flashcard */
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 18px;
            margin-top: 20px;
        }

        .word-card {
            background: #fff;
            border: 3px solid #E2E8F0;
            border-radius: 20px;
            padding: 18px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            overflow: hidden;
        }

        .word-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--primary);
            background-color: #FFF5F5;
        }

        .word-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2D3748;
            margin: 0;
        }

        .word-ipa {
            color: #718096;
            font-size: 1rem;
            margin: 5px 0 0 0;
            background: #EDF2F7;
            border-radius: 10px;
            padding: 2px 5px;
            display: inline-block;
        }

        /* Danh sách câu luyện đọc */
        .sentence-list {
            margin-top: 20px;
        }

        .sentence-item {
            background: #F8FAFC;
            border: 2px solid #E2E8F0;
            border-left: 8px solid var(--secondary);
            padding: 20px;
            margin-bottom: 18px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .sentence-item:hover {
            border-color: var(--secondary);
            background: #F0FDFA;
            transform: translateX(5px);
        }

        .sentence-content {
            flex-grow: 1;
            padding-right: 20px;
        }

        .sentence-eng {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1A365D;
            margin: 0;
            line-height: 1.6;
        }

        /* Từng từ đơn lẻ trong câu để con bấm */
        .word-span {
            display: inline-block;
            cursor: pointer;
            padding: 0 4px;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .word-span:hover {
            background-color: var(--warning);
            color: #000;
            transform: scale(1.1);
        }

        /* Hiệu ứng Karaoke: Từ nào đang đọc sẽ sáng màu này lên */
        .word-span.highlight-active {
            background-color: var(--primary) !important;
            color: white !important;
            transform: scale(1.15);
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);
        }

        .sentence-vi {
            font-size: 1rem;
            color: #4A5568;
            margin: 8px 0 0 0;
            font-style: italic;
        }

        .control-btns {
            display: flex;
            gap: 10px;
        }

        .app-btn {
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
            transition: all 0.1s;
        }

        .btn-play { background: var(--primary); }
        .btn-mic { background: var(--accent); }

        .app-btn:active { transform: scale(0.9); }
        .app-btn svg { fill: white; width: 22px; height: 22px; }

        /* Animation khi đang phát âm */
        .wave-active {
            animation: pulse-wave 0.6s infinite alternate;
        }
        @keyframes pulse-wave {
            from { transform: scale(1); box-shadow: 0 0 0 0px rgba(255, 107, 107, 0.4); }
            to { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(255, 107, 107, 0); }
        }

        /* Tương thích thiết bị di động */
        @media (max-width: 768px) {
            .brand-box { position: static; margin-bottom: 15px; width: 90%; }
            .container { margin-top: 10px; padding: 15px; }
            h1 { font-size: 1.8rem; }
            .sentence-eng { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

    <!-- KHU VỰC CHỮ KÝ THƯƠNG HIỆU CỦA CÔ HÀ -->
    <div class="brand-box">
        <span class="brand-top">Tiếng anh cô Hà - 0392.661.652</span>
        <span class="brand-bottom">Nhịp cầu nhỏ bước ra thế giới</span>
    </div>

    <div class="container">
        <h1 id="main-title">OXFORD PHONICS WORLD</h1>
        <div class="sub-title" id="sub-title">Bé Luyện Đánh Vần Tiếng Anh</div>

        <!-- PHẦN 1: TỪ VỰNG -->
        <div class="section-header">🎈 1. Bấm Xem & Nghe Âm Từ Từ Rời</div>
        <div class="word-grid" id="words-grid"></div>

        <!-- PHẦN 2: LUYỆN CÂU KARAOKE -->
        <div class="section-header">📖 2. Bé Tập Đọc Theo Câu Học</div>
        <div class="sentence-list" id="sentences-list"></div>
    </div>

    <script>
        // Dữ liệu mẫu lấy từ nội dung file "ĐÁNH VẦN TIẾNG ANH oxford phonics world.pdf" của bạn
        const currentLesson = {
            lessonName: "SHORT VOWELS (Nguyên âm ngắn /æ/)",
            words: [
                { text: "Cat", ipa: "/kæt/" },
                { text: "Ant", ipa: "/ænt/" },
                { text: "Fan", ipa: "/fæn/" },
                { text: "Man", ipa: "/mæn/" },
                { text: "Dad", ipa: "/dæd/" },
                { text: "Hat", ipa: "/hæt/" },
                { text: "Bag", ipa: "/bæg/" },
                { text: "Map", ipa: "/mæp/" }
            ],
            sentences: [
                { eng: "I see an ant and an ax.", vi: "Tớ nhìn thấy một con kiến và một cái rìu." },
                { eng: "The man has a fan and a hat.", vi: "Người đàn ông có một cái quạt và một chiếc mũ." },
                { eng: "Is that your bag on the mat?", vi: "Có phải cái cặp của bạn ở trên tấm thảm không?" }
            ]
        };

        // Hàm phát âm cốt lõi sử dụng thư viện SpeechSynthesis có sẵn của trình duyệt
        function playAudio(text, onBoundaryWord = null, onEndCallback = null) {
            window.speechSynthesis.cancel(); // Dừng ngay lập tức các âm thanh cũ tránh bị đè tiếng
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.82; // Tốc độ 0.82 là hoàn hảo cho học sinh tiểu học nghe rõ ending sounds

            // Kỹ thuật Karaoke: Xác định từ nào đang được đọc dựa trên vị trí ký tự
            if (onBoundaryWord) {
                utterance.onboundary = (event) => {
                    if (event.name === 'word') {
                        // Trích xuất từ đang đọc dựa vào vị trí ký tự (charIndex) và độ dài (charLength)
                        const wordBeingSpoken = text.substr(event.charIndex, event.charLength);
                        onBoundaryWord(event.charIndex, wordBeingSpoken);
                    }
                };
            }

            if (onEndCallback) {
                utterance.onend = onEndCallback;
            }

            window.speechSynthesis.speak(utterance);
        }

        function initApplication() {
            document.getElementById('sub-title').innerText = "Bài học: " + currentLesson.lessonName;

            // ---- RENDER PHẦN TỪ VỰNG ----
            const wordsGrid = document.getElementById('words-grid');
            currentLesson.words.forEach(item => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.onclick = () => playAudio(item.text);
                card.innerHTML = `
                    <div class="word-text">${item.text}</div>
                    <div class="word-ipa">${item.ipa}</div>
                `;
                wordsGrid.appendChild(card);
            });

            // ---- RENDER PHẦN LUYỆN CÂU (TÍNH NĂNG CỰC MẠNH) ----
            const sentencesList = document.getElementById('sentences-list');
            currentLesson.sentences.forEach((item, sIndex) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'sentence-item';

                // Tách câu thành mảng từ, giữ lại vị trí bắt đầu của mỗi từ để phục vụ Karaoke
                const words = item.eng.split(" ");
                let currentPos = 0;
                
                const spansHtml = words.map((word) => {
                    const cleanWord = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~?]/g,"");
                    const startIdx = item.eng.indexOf(word, currentPos);
                    currentPos = startIdx + word.length;

                    // Mỗi từ bọc trong một thẻ span có thuộc tính data-start để đối chiếu dữ liệu âm thanh
                    return `<span class="word-span" data-start="${startIdx}" onclick="event.stopPropagation(); playAudio('${cleanWord}')">${word}</span>`;
                }).join(" ");

                itemDiv.innerHTML = `
                    <div class="sentence-content">
                        <div class="sentence-eng" id="eng-sentence-${sIndex}">${spansHtml}</div>
                        <p class="sentence-vi">${sIndex + 1}. ${item.vi}</p>
                    </div>
                    <div class="control-btns">
                        <!-- Nút Đọc mẫu mẫu -->
                        <button class="app-btn btn-play" title="Nghe cô đọc mẫu" onclick="runKaraoke(${sIndex}, '${item.eng.replace(/'/g, "\\'")}')">
                            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                    </div>
                `;
                sentencesList.appendChild(itemDiv);
            });
        }

        // Kỹ thuật đồng bộ chữ và tiếng (Karaoke Nhắc Chữ)
        function runKaraoke(sentenceIndex, fullText) {
            const container = document.getElementById(`eng-sentence-${sentenceIndex}`);
            const spans = container.querySelectorAll('.word-span');
            const playBtn = container.closest('.sentence-item').querySelector('.btn-play');
            
            playBtn.classList.add('wave-active');

            // Gọi hàm playAudio kèm sự kiện nhận diện vị trí từ đang phát âm
            playAudio(fullText, (charIndex, word) => {
                // Duyệt qua các từ, từ nào trùng khớp vị trí thì bật class phát sáng
                spans.forEach(span => {
                    const spanStart = parseInt(span.getAttribute('data-start'));
                    // Nếu vị trí của từ nằm trong tầm phát âm hiện tại
                    if (spanStart === charIndex || (charIndex > spanStart && charIndex < spanStart + span.innerText.length)) {
                        span.classList.add('highlight-active');
                    } else {
                        span.classList.remove('highlight-active');
                    }
                });
            }, () => {
                // Khi kết thúc bài đọc, tắt toàn bộ hiệu ứng phát sáng
                spans.forEach(span => span.classList.remove('highlight-active'));
                playBtn.classList.remove('wave-active');
            });
        }

        // Khởi chạy ứng dụng khi tải trang thành công
        window.onload = initApplication;
    </script>
</body>
</html>
