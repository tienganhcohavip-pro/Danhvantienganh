<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÉ LUYỆN ĐÁNH VẦN TIẾNG ANH - LESSON 8</title>
    <style>
        :root {
            --bg-app: #F0FDF4;          /* Màu xanh lá mầm dịu mắt cho tiểu học */
            --header-bg: #E0F2FE;       /* Xanh ngọc thương hiệu từ Lesson 7 */
            --text-brand: #0369A1;      
            --text-main: #1E293B;      
            --vowel-red: #FF0000;       /* Đỏ rực để kích thích thị giác nhận diện âm */
            --btn-word: #38BDF8;
            --btn-sentence: #FB923C;
            --card-bg: #FFFFFF;
            
            /* Màu viền khung câu theo đúng ảnh đính kèm */
            --border-orange: #F97316;
            --border-blue: #38BDF8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        header {
            background-color: var(--header-bg);
            padding: 30px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 8px 24px rgba(3, 105, 161, 0.1);
        }

        header .main-title {
            color: var(--text-brand);
            font-size: 2.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0px #FFF;
        }

        header .sub-title {
            color: #0E7490;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        header .lesson-title {
            display: inline-block;
            background-color: #BAE6FD;
            color: #0369A1;
            padding: 10px 25px;
            font-size: 1.4rem;
            font-weight: 800;
            border-radius: 20px;
            border: 3px solid #7DD3FC;
        }

        /* Menu chuyển Tab lớn, dễ bấm cho trẻ em */
        .tab-menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 35px auto;
            max-width: 700px;
            padding: 0 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border: 3px solid #CBD5E1;
            border-radius: 24px;
            background-color: #E2E8F0;
            color: #475569;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .tab-btn.active {
            background-color: #0EA5E9;
            color: white;
            border-color: #0284C7;
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* Grid từ vựng */
        .words-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .words-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .word-card {
            background: var(--card-bg);
            border: 4px solid #E2E8F0;
            border-radius: 28px;
            padding: 30px 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
        }

        .word-card:hover {
            transform: translateY(-5px);
            border-color: var(--btn-word);
            box-shadow: 0 12px 20px rgba(56, 189, 248, 0.2);
        }

        .word-card.playing {
            border-color: var(--vowel-red);
            background-color: #FEF2F2;
        }

        .word-text {
            font-size: 3rem; /* Chữ siêu to giúp các con dễ nhìn */
            font-weight: bold;
            color: #000;
            margin-bottom: 5px;
        }

        /* Class bôi đỏ bắt buộc cho Phonics */
        .highlight-vowel {
            color: var(--vowel-red) !important;
            font-weight: 800;
        }

        .ipa-text {
            font-size: 1.2rem;
            color: #0284C7;
            font-style: italic;
            font-weight: 600;
        }

        .meaning-text {
            font-size: 1.1rem;
            color: #64748B;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Khu vực Luyện Đọc Câu */
        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .sentence-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 35px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.02);
            position: relative;
        }

        /* Áp dụng viền cam/xanh xen kẽ theo hình ảnh mẫu */
        .border-style-orange { border: 4px solid var(--border-orange); }
        .border-style-blue { border: 4px solid var(--border-blue); }

        .play-all-btn {
            background-color: var(--btn-sentence);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: all 0.2s;
            box-shadow: 0 6px 15px rgba(251, 146, 60, 0.3);
        }

        .play-all-btn:hover {
            background-color: #EA580C;
            transform: scale(1.04);
        }

        .play-all-btn.playing {
            background-color: #10B981;
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3);
        }

        .sentence-words-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 18px;
            margin: 20px 0;
        }

        .sentence-num {
            font-weight: 800;
            color: var(--text-brand);
            font-size: 2.2rem;
            margin-right: 10px;
        }

        /* Từ đơn lẻ trong câu biến thành các nút tương tác trực quan */
        .clickable-word {
            display: inline-block;
            padding: 10px 22px;
            font-size: 2.2rem; /* Kích thước chữ trong câu lớn cho học sinh tiểu học */
            font-weight: 700;
            background-color: #F8FAFC;
            border-radius: 20px;
            cursor: pointer;
            border: 3px solid #E2E8F0;
            transition: all 0.15s;
            user-select: none;
        }

        .clickable-word:hover {
            background-color: #F1F5F9;
            border-color: var(--btn-word);
            transform: scale(1.08);
        }

        .clickable-word.playing-word {
            background-color: #FEF2F2;
            border-color: var(--vowel-red);
            animation: bounce 0.3s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .sentence-translation {
            font-size: 1.3rem;
            color: #475569;
            font-style: italic;
            margin-top: 20px;
            font-weight: 600;
            border-top: 1px dashed #E2E8F0;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <div class="main-title">BÉ LUYỆN ĐÁNH VẦN TIẾNG ANH</div>
        <div class="sub-title">Tiếng anh cô Hà - Nhịp cầu nhỏ bước ra thế giới</div>
        <div class="lesson-title">Lesson 8: Nguyên âm dài /əʊ/, /u:/, /ju:/</div>
    </header>

    <div class="tab-menu">
        <button class="tab-btn active" id="tabWords" onclick="changeTab('words')">🔤 24 Từ Vựng Đánh Vần</button>
        <button class="tab-btn" id="tabSentences" onclick="changeTab('sentences')">📖 6 Câu Luyện Đọc</button>
    </div>

    <div class="container">
        
        <!-- SECTION 1: 24 TỪ VỰNG TIỂU HỌC -->
        <section id="sectionWords" class="content-section active">
            <div class="words-grid" id="wordsGrid">
                <!-- Data tự động hiển thị từ Javascript -->
            </div>
        </section>

        <!-- SECTION 2: ĐẦY ĐỦ 6 CÂU LUYỆN ĐỌC GIẢI MÃ CHUẨN TỪ IMAGE_F3343C.PNG -->
        <section id="sectionSentences" class="content-section">
            <div class="sentence-list" id="sentencesList">
                <!-- Data tự động hiển thị từ Javascript -->
            </div>
        </section>

    </div>

    <script>
        // CƠ SỞ DỮ LIỆU CHUẨN PHÁT ÂM OXFORD DICTIONARY
        const lesson8Data = {
            words: [
                // Nhóm vần "oa"
                { word: "boat", ipa: "/bəʊt/", meaning: "con thuyền" }, 
                { word: "coat", ipa: "/kəʊt/", meaning: "áo khoác" }, 
                { word: "soap", ipa: "/səʊp/", meaning: "bánh xà phòng" }, 
                { word: "road", ipa: "/rəʊd/", meaning: "con đường" },

                // Nhóm vần "ow"
                { word: "bow", ipa: "/bəʊ/", meaning: "cái nơ" }, 
                { word: "row", ipa: "/rəʊ/", meaning: "chèo thuyền" }, 
                { word: "yellow", ipa: "/ˈjeləʊ/", meaning: "màu vàng" }, 
                { word: "pillow", ipa: "/ˈpɪləʊ/", meaning: "cái gối" },

                // Nhóm vần mở rộng "oa" và "ow"
                { word: "goat", ipa: "/ɡəʊt/", meaning: "con dê" }, 
                { word: "toad", ipa: "/təʊd/", meaning: "con cóc" }, 
                { word: "elbow", ipa: "/ˈelbəʊ/", meaning: "khuỷu tay" }, 
                { word: "window", ipa: "/ˈwɪndəʊ/", meaning: "cửa sổ" },

                // Nhóm vần "ue"
                { word: "blue", ipa: "/bluː/", meaning: "màu xanh dương" }, 
                { word: "glue", ipa: "/ɡluː/", meaning: "keo dán" }, 
                { word: "clue", ipa: "/kluː/", meaning: "manh mối" }, 
                { word: "Tuesday", ipa: "/ˈtjuːzdeɪ/", meaning: "thứ Ba" },

                // Nhóm vần "ui" và "ew"
                { word: "fruit", ipa: "/fruːt/", meaning: "trái cây" }, 
                { word: "suit", ipa: "/suːt/", meaning: "bộ vest" }, 
                { word: "new", ipa: "/njuː/", meaning: "mới" }, 
                { word: "dew", ipa: "/djuː/", meaning: "giọt sương" },

                // Nhóm vần "oo"
                { word: "moon", ipa: "/muːn/", meaning: "mặt trăng" }, 
                { word: "zoo", ipa: "/zuː/", meaning: "vườn bách thú" }, 
                { word: "food", ipa: "/fuːd/", meaning: "đồ ăn" }, 
                { word: "boot", ipa: "/buːt/", meaning: "chiếc ủng" }
            ],
            sentences: [
                { num: "19.", sentence: "The goat and the toad row a boat on the road.", meaning: "Chú dê và chú cóc chèo một chiếc thuyền ở trên đường đi.", style: "orange" },
                { num: "20.", sentence: "A pillow and a bow are by the yellow window.", meaning: "Một chiếc gối và một cái nơ nằm ở cạnh chiếc cửa sổ màu vàng.", style: "blue" },
                { num: "21.", sentence: "The clue is blue glue on Tuesday.", meaning: "Manh mối thu thập được chính là vết keo dán màu xanh dương vào ngày thứ Ba.", style: "orange" },
                { num: "22.", sentence: "I eat fruit in my new boots suit.", meaning: "Tớ ăn trái cây ngon lành trong bộ đồ vest cùng đôi ủng mới tinh.", style: "blue" },
                { num: "23.", sentence: "The moon is over the zoo.", meaning: "Mặt trăng tròn đang tỏa sáng phía bên trên vườn bách thú.", style: "orange" },
                { num: "24.", sentence: "The food is by my boot.", meaning: "Khay đồ ăn thơm phức đang đặt ngay cạnh chiếc ủng của tớ.", style: "blue" }
            ]
        };

        // ENGINE QUÉT PHONICS NÂNG CAO - SỬA LỖI BÔI ĐỎ TRONG CÂU VÀ TỪ
        function highlightVowels(text) {
            // Tách dấu câu (ví dụ dấu chấm, dấu phẩy cuối từ) để xử lý riêng biệt
            let coreWord = text.replace(/[.,?]$/, "");
            let punctuation = text.substring(coreWord.length);
            let lowerWord = coreWord.toLowerCase();

            // Danh sách cụm vần mục tiêu bài học 8
            const patterns = ["oa", "ow", "ue", "ui", "ew", "oo"];
            let highlighted = coreWord;

            for (let pattern of patterns) {
                if (lowerWord.includes(pattern)) {
                    let idx = lowerWord.indexOf(pattern);
                    // Cắt chuỗi và bọc class highlight-vowel vào cụm vần mục tiêu
                    highlighted = coreWord.substring(0, idx) + 
                                  `<span class="highlight-vowel">${coreWord.substr(idx, pattern.length)}</span>` + 
                                  coreWord.substring(idx + pattern.length);
                    break; // Ưu tiên tìm thấy cụm dài đầu tiên thì dừng lại áp dụng luôn
                }
            }
            return highlighted + punctuation;
        }

        // ENGINE PHÁT ÂM GIỌNG MỸ CHUẨN - TỐC ĐỘ SƯ PHẠM 0.7
        function playAudio(textToSpeak, element, activeClass) {
            window.speechSynthesis.cancel(); // Tắt âm thanh cũ ngay lập tức khi bấm nút mới

            // Reset toàn bộ hiệu ứng đổi màu đang chạy trên màn hình
            document.querySelectorAll('.word-card, .play-all-btn, .clickable-word').forEach(el => {
                el.classList.remove('playing', 'playing-word');
            });

            if (element) {
                element.classList.add(activeClass);
            }

            // Làm sạch chuỗi ký tự đặc biệt trước khi đưa vào bộ đọc máy
            let cleanText = textToSpeak.replace(/[.,?\/#!$%\^&\*;:{}=\-_`~()]/g, "");
            let utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = 'en-US'; 
            utterance.rate = 0.7; // Tốc độ đọc chậm, rõ từng âm tiết cho học sinh tiểu học học theo

            utterance.onend = () => {
                if (element) {
                    element.classList.remove(activeClass);
                }
            };

            window.speechSynthesis.speak(utterance);
        }

        // KHỞI TẠO TAB 1: DANH SÁCH 24 TỪ VỰNG
        function renderVocabulary() {
            const grid = document.getElementById('wordsGrid');
            grid.innerHTML = lesson8Data.words.map(item => `
                <div class="word-card" onclick="playAudio('${item.word}', this, 'playing')">
                    <div class="word-text">${highlightVowels(item.word)}</div>
                    <div class="ipa-text">${item.ipa}</div>
                    <div class="meaning-text">${item.meaning}</div>
                </div>
            `).join('');
        }

        // KHỞI TẠO TAB 2: ĐẦY ĐỦ TRỌN VẸN VỚI 6 CÂU LUYỆN ĐỌC TƯƠNG TÁC ĐA ĐIỂM
        function renderSentences() {
            const list = document.getElementById('sentencesList');
            list.innerHTML = lesson8Data.sentences.map(item => {
                // Tách câu thành mảng từ đơn để gán chức năng nghe phát âm riêng cho từng từ
                const wordsArray = item.sentence.split(' ');
                const wordsRowHtml = wordsArray.map(word => {
                    // Loại bỏ dấu câu để máy đọc chuẩn xác không bị ngắt quãng
                    const cleanWord = word.replace(/[.,?]/g, "");
                    return `
                        <span class="clickable-word" onclick="event.stopPropagation(); playAudio('${cleanWord}', this, 'playing-word')">
                            ${highlightVowels(word)}
                        </span>
                    `;
                }).join('');

                return `
                    <div class="sentence-card border-style-${item.style}">
                        <button class="play-all-btn" onclick="playAudio('${item.sentence}', this, 'playing')">
                            🔊 Nghe Toàn Bộ Câu
                        </button>
                        <div class="sentence-words-row">
                            <span class="sentence-num">${item.num}</span>
                            ${wordsRowHtml}
                        </div>
                        <div class="sentence-translation">${item.meaning}</div>
                    </div>
                `;
            }).join('');
        }

        // ĐIỀU HƯỚNG CHUYỂN ĐỔI QUA LẠI GIỮA CÁC TAB BÀI HỌC
        function changeTab(tabName) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            window.speechSynthesis.cancel(); 

            if (tabName === 'words') {
                document.getElementById('sectionWords').classList.add('active');
                document.getElementById('tabWords').classList.add('active');
            } else {
                document.getElementById('sectionSentences').classList.add('active');
                document.getElementById('tabSentences').classList.add('active');
            }
        }

        // Chạy khởi tạo ứng dụng khi trang web hoàn tất tải dữ liệu
        window.onload = () => {
            renderVocabulary();
            renderSentences();
        };
    </script>
</body>
</html>
