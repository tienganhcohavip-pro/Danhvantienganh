<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Vowel a /æ/ - Oxford Phonics World</title>
    <style>
        :root {
            --bg-color: #F7FFF7;
            --header-bg: #FFD166;
            --card-border: #E0E0E0;
            --accent-vowel: #EF476F; 
            --tab-word-bg: #4EA8DE;
            --tab-rhyme-bg: #06D6A0;
            --text-dark: #2B2D42;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding-bottom: 60px;
        }

        header {
            background-color: var(--header-bg);
            padding: 25px 15px;
            text-align: center;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        header h1 {
            font-size: 2.2rem;
            color: #118AB2;
            margin-bottom: 5px;
        }

        header p {
            font-size: 1.1rem;
            color: #073B4C;
            font-weight: 600;
        }

        .tab-menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px auto;
            max-width: 600px;
            padding: 0 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid #CCC;
            border-radius: 12px;
            background-color: #FFF;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active-words {
            background-color: var(--tab-word-bg);
            color: white;
            border-color: #3a8ebc;
        }

        .tab-btn.active-rhymes {
            background-color: var(--tab-rhyme-bg);
            color: white;
            border-color: #04b386;
        }

        .section-content {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .section-content.active {
            display: block;
        }

        /* Words Grid layout */
        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
        }

        .word-card {
            background: white;
            border: 2px solid var(--card-border);
            border-radius: 18px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: transform 0.2s, border-color 0.2s;
        }

        .word-card:hover {
            transform: translateY(-4px);
            border-color: var(--tab-word-bg);
        }

        .word-card.playing {
            border-color: var(--accent-vowel);
            background-color: #FFEBEF;
            animation: bounce 0.4s ease;
        }

        .placeholder-pic {
            width: 80px;
            height: 80px;
            background-color: #EBF8FF;
            border-radius: 50%;
            margin: 0 auto 12px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .word-text {
            font-size: 1.7rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .letter-a {
            color: var(--accent-vowel);
            font-weight: 800;
        }

        .ipa-text {
            font-size: 1rem;
            color: #666;
            margin: 4px 0;
        }

        /* Rhyme Groups layout */
        .rhyme-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .rhyme-block {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border-left: 6px solid var(--tab-rhyme-bg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .rhyme-header {
            font-size: 1.4rem;
            font-weight: bold;
            color: #073B4C;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rhyme-header span {
            background: #E0FBF4;
            color: #06D6A0;
            padding: 2px 10px;
            border-radius: 8px;
            font-size: 1.1rem;
        }

        .rhyme-words {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn-inline-word {
            background-color: #F8F9FA;
            border: 1px solid #DEE2E6;
            padding: 8px 16px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-inline-word:hover {
            background-color: #E9ECEF;
            border-color: #CED4DA;
        }

        .btn-inline-word.playing {
            background-color: var(--accent-vowel);
            color: white;
            border-color: var(--accent-vowel);
        }

        @keyframes bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Short Vowel a /æ/</h1>
        <p>Oxford Phonics World 1 - Học phát âm nguyên âm A ngắn 🌟</p>
    </header>

    <div class="tab-menu">
        <button class="tab-btn active-words" id="tab1" onclick="switchTab('words')">📖 Từ vựng tổng hợp</button>
        <button class="tab-btn" id="tab2" onclick="switchTab('rhymes')">🌿 Học theo Nhóm Vần</button>
    </div>

    <section id="sectionWords" class="section-content active">
        <div class="words-grid" id="wordsGrid"></div>
    </section>

    <section id="sectionRhymes" class="section-content">
        <div class="rhyme-container" id="rhymeContainer"></div>
    </section>

    <script>
        // Nội dung bài học trích xuất từ dữ liệu trang 1 & trang 3 của tài liệu Oxford Phonics World
        const lessonData = {
            // Danh sách các từ đại diện xuất hiện ở phần đầu trang 3
            mainWords: [
                { word: "cat", ipa: "/kæt/", emoji: "🐱" },
                { word: "ant", ipa: "/ænt/", emoji: "🐜" },
                { word: "yak", ipa: "/jæk/", emoji: "🐂" },
                { word: "ax", ipa: "/æks/", emoji: "🪓" }
            ],
            // 6 nhóm vần cốt lõi của nguyên âm a ngắn được liệt kê trong bài học
            rhymeGroups: [
                { rhyme: "am", ipa: "/æm/", words: ["ram", "jam", "dam", "yam"] },
                { rhyme: "an", ipa: "/æn/", words: ["fan", "man", "pan", "can"] },
                { rhyme: "ad", ipa: "/æd/", words: ["dad", "pad"] },
                { rhyme: "ag", ipa: "/æg/", words: ["bag", "rag"] },
                { rhyme: "ap", ipa: "/æp/", words: ["tap", "nap", "map", "cap"] },
                { rhyme: "at", ipa: "/æt/", words: ["rat", "bat", "hat", "mat"] }
            ]
        };

        // Hàm phát âm chuẩn giọng Anh-Mỹ sử dụng bộ máy SpeechSynthesis tích hợp của trình duyệt
        function speakWord(text, element, activeClass) {
            // Dừng các giọng đọc đang chạy (nếu có)
            window.speechSynthesis.cancel();
            
            // Xóa trạng thái nhấp nháy cũ
            document.querySelectorAll('.word-card, .btn-inline-word').forEach(el => el.classList.remove('playing'));

            if (element) element.classList.add(activeClass);

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';  // C
