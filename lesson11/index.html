<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÉ LUYỆN ĐÁNH VẦN TIẾNG ANH - LESSON 11</title>
    <style>
        :root {
            --bg-app: #F0FDF4;          /* Màu xanh lá mầm dịu mắt học đường */
            --header-bg: #E0F2FE;       /* Xanh dương nhạt nguyên bản */
            --text-brand: #0369A1;      
            --text-main: #1E293B;      
            --vowel-red: #FF0000;       /* Màu đỏ nổi bật cho cụm phụ âm mục tiêu */
            --btn-word: #38BDF8;
            --btn-sentence: #FB923C;
            --card-bg: #FFFFFF;
            
            /* Màu viền khung câu tương thích theo ảnh đính kèm */
            --border-orange: #F97316;
            --border-blue: #38BDF8;
            --border-purple: #A855F7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        header {
            background-color: var(--header-bg);
            padding: 30px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 8px 24px rgba(3, 105, 161, 0.1);
        }

        header .main-title {
            color: var(--text-brand);
            font-size: 2.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0px #FFF;
        }

        header .sub-title {
            color: #0E7490;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        header .lesson-title {
            display: inline-block;
            background-color: #BAE6FD;
            color: #0369A1;
            padding: 10px 25px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 20px;
            border: 3px solid #7DD3FC;
        }

        .tab-menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 35px auto;
            max-width: 700px;
            padding: 0 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border: 3px solid #CBD5E1;
            border-radius: 24px;
            background-color: #E2E8F0;
            color: #475569;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .tab-btn.active {
            background-color: #0EA5E9;
            color: white;
            border-color: #0284C7;
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* Grid từ vựng */
        .words-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .words-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .word-card {
            background: var(--card-bg);
            border: 4px solid #E2E8F0;
            border-radius: 28px;
            padding: 30px 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
        }

        .word-card:hover {
            transform: translateY(-5px);
            border-color: var(--btn-word);
            box-shadow: 0 12px 20px rgba(56, 189, 248, 0.2);
        }

        .word-card.playing {
            border-color: var(--vowel-red);
            background-color: #FEF2F2;
        }

        .word-text {
            font-size: 3rem;
            font-weight: bold;
            color: #000;
            margin-bottom: 5px;
        }

        /* Điểm tập trung Phonics bôi đỏ chữ viết tiêu điểm */
        .highlight-vowel {
            color: var(--vowel-red) !important;
            font-weight: 800;
        }

        .ipa-text {
            font-size: 1.2rem;
            color: #0284C7;
            font-style: italic;
            font-weight: 600;
        }

        .meaning-text {
            font-size: 1.1rem;
            color: #64748B;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Khu vực câu luyện đọc */
        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .sentence-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 35px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.02);
            position: relative;
        }

        /* Đồng bộ viền màu sắc sinh động từ ảnh image_e7ea5e.png */
        .border-style-orange { border: 4px solid var(--border-orange); }
        .border-style-blue { border: 4px solid var(--border-blue); }
        .border-style-purple { border: 4px solid var(--border-purple); }

        .play-all-btn {
            background-color: var(--btn-sentence);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: all 0.2s;
            box-shadow: 0 6px 15px rgba(251, 146, 60, 0.3);
        }

        .play-all-btn:hover {
            background-color: #EA580C;
            transform: scale(1.04);
        }

        .play-all-btn.playing {
            background-color: #10B981;
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3);
        }

        .sentence-words-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 18px;
            margin: 20px 0;
        }

        .sentence-num {
            font-weight: 800;
            color: var(--text-brand);
            font-size: 2.2rem;
            margin-right: 10px;
        }

        .clickable-word {
            display: inline-block;
            padding: 10px 22px;
            font-size: 2.2rem;
            font-weight: 700;
            background-color: #F8FAFC;
            border-radius: 20px;
            cursor: pointer;
            border: 3px solid #E2E8F0;
            transition: all 0.15s;
            user-select: none;
        }

        .clickable-word:hover {
            background-color: #F1F5F9;
            border-color: var(--btn-word);
            transform: scale(1.08);
        }

        .clickable-word.playing-word {
            background-color: #FEF2F2;
            border-color: var(--vowel-red);
            animation: bounce 0.3s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .sentence-translation {
            font-size: 1.3rem;
            color: #475569;
            font-style: italic;
            margin-top: 20px;
            font-weight: 600;
            border-top: 1px dashed #E2E8F0;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <div class="main-title">BÉ LUYỆN ĐÁNH VẦN TIẾNG ANH</div>
        <div class="sub-title">Tiếng anh cô Hà - Nhịp cầu nhỏ bước ra thế giới</div>
        <div class="lesson-title">Lesson 11: Phụ âm ghép /ð/, /θ/, /k/, /kw/, /ŋ/, /nd/, /nt/, /lt/, /mp/</div>
    </header>

    <div class="tab-menu">
        <button class="tab-btn active" id="tabWords" onclick="changeTab('words')">🔤 24 Từ Vựng Đánh Vần</button>
        <button class="tab-btn" id="tabSentences" onclick="changeTab('sentences')">📖 6 Câu Luyện Đọc</button>
    </div>

    <div class="container">
        
        <!-- SECTION 1: 24 TỪ VỰNG TIỂU HỌC -->
        <section id="sectionWords" class="content-section active">
            <div class="words-grid" id="wordsGrid">
                <!-- Javascript tự động đổ dữ liệu từ vựng -->
            </div>
        </section>

        <!-- SECTION 2: 6 CÂU LUYỆN ĐỌC TƯƠNG TÁC -->
        <section id="sectionSentences" class="content-section">
            <div class="sentence-list" id="sentencesList">
                <!-- Javascript tự động đổ dữ liệu câu -->
            </div>
        </section>

    </div>

    <script>
        // CƠ SỞ DỮ LIỆU TỪ VỰNG GIẢI MÃ CHÍNH XÁC TỪ IMAGE_E7EA96.PNG THEO TỪ ĐIỂN OXFORD
        const lesson11Data = {
            words: [
                // Hàng 1: Âm hữu thanh /ð/ đại diện bằng chữ viết 'th'
                { word: "this", ipa: "/ðɪs/", meaning: "đây, cái này" }, 
                { word: "that", ipa: "/ðæt/", meaning: "kia, cái kia" }, 
                { word: "mother", ipa: "/ˈmʌðə(r)/", meaning: "mẹ" }, 
                { word: "father", ipa: "/ˈfɑːðə(r)/", meaning: "bố, cha" },

                // Hàng 2: Âm vô thanh /θ/ đại diện bằng chữ viết 'th'
                { word: "three", ipa: "/θriː/", meaning: "số 3" }, 
                { word: "teeth", ipa: "/tiːθ/", meaning: "những chiếc răng" }, 
                { word: "think", ipa: "/θɪŋk/", meaning: "suy nghĩ" }, 
                { word: "bath", ipa: "/bɑːθ/", meaning: "bồn tắm / tắm" },

                // Hàng 3: Âm /k/ viết bằng 'ck' và âm /kw/ viết bằng 'qu'
                { word: "duck", ipa: "/dʌk/", meaning: "con vịt" }, 
                { word: "rocket", ipa: "/ˈrɒkɪt/", meaning: "tên lửa" }, 
                { word: "queen", ipa: "/kwiːn/", meaning: "nữ hoàng" }, 
                { word: "quilt", ipa: "/kwɪlt/", meaning: "chăn bông" },

                // Hàng 4: Âm /ŋ/ đại diện bằng chữ viết 'ng' và tổ hợp âm cổ họng 'nk'
                { word: "king", ipa: "/kɪŋ/", meaning: "vua, quốc vương" }, 
                { word: "long", ipa: "/lɒŋ/", meaning: "dài" }, 
                { word: "bank", ipa: "/bæŋk/", meaning: "ngân hàng" }, 
                { word: "pink", ipa: "/pɪŋk/", meaning: "màu hồng" },

                // Hàng 5: Phụ âm ghép cuối từ 'nd' và 'nt'
                { word: "wind", ipa: "/wɪnd/", meaning: "gió" }, 
                { word: "hand", ipa: "/hænd/", meaning: "bàn tay" }, 
                { word: "tent", ipa: "/tent/", meaning: "cái lều" }, 
                { word: "paint", ipa: "/peɪnt/", meaning: "sơn, vẽ màu" },

                // Hàng 6: Phụ âm ghép cuối từ 'lt' và 'mp'
                { word: "belt", ipa: "/belt/", meaning: "thắt lưng, dây nịt" }, 
                { word: "adult", ipa: "/ˈædʌlt/", meaning: "người lớn, người trưởng thành" }, 
                { word: "lamp", ipa: "/læmp/", meaning: "cái đèn" }, 
                { word: "camp", ipa: "/kæmp/", meaning: "trại, bãi cắm trại" }
            ],
            sentences: [
                { num: "37.", sentence: "This is my mother and that is my father.", meaning: "Đây là mẹ của tớ và kia là bố của tớ.", style: "orange" },
                { num: "38.", sentence: "Three kids think and clean their teeth.", meaning: "Ba bạn nhỏ đang suy nghĩ và cùng nhau chải sạch răng của mình.", style: "orange" },
                { num: "39.", sentence: "The duck makes a quilt and the queen makes a rocket.", meaning: "Chú vịt đang làm một chiếc chăn bông, còn nữ hoàng thì chế tạo một chiếc tên lửa.", style: "purple" },
                { num: "40.", sentence: "The king is at the bank in a long pink coat.", meaning: "Quốc vương đang ở ngân hàng và ngài mặc một chiếc áo khoác dáng dài màu hồng.", style: "blue" },
                { num: "41.", sentence: "Can you paint a tent by hand?", meaning: "Bạn có thể tự sơn trang trí một chiếc lều bằng chính đôi tay của mình không?", style: "orange" },
                { num: "42.", sentence: "The man with a belt brings a lamp to the camp.", meaning: "Người đàn ông mang thắt lưng đang cầm một chiếc đèn tiến về khu cắm trại.", style: "blue" }
            ]
        };

        // THUẬT TOÁN TỰ ĐỘNG HIGHLIGHT CHUẨN PHONICS VỊ TRÍ BẤT KỲ TRONG TỪ CHO LESSON 11
        function highlightBlends(text) {
            let coreWord = text.replace(/[.,?]$/, ""); // Loại bỏ dấu câu ở cuối từ tạm thời để xử lý chuỗi
            let punctuation = text.substring(coreWord.length);
            let lowerWord = coreWord.toLowerCase();

            // Danh sách các tổ hợp chữ viết đại diện tương ứng của 9 mục tiêu âm vị bài này
            const targets = ["th", "ck", "qu", "ng", "nk", "nd", "nt", "lt", "mp"];
            let highlighted = coreWord;

            for (let target of targets) {
                if (lowerWord.includes(target)) {
                    let idx = lowerWord.indexOf(target);
                    // Cắt chuỗi chính xác vị trí và bọc class màu đỏ rực cho tổ hợp tiêu điểm mục tiêu
                    highlighted = coreWord.substring(0, idx) + 
                                  `<span class="highlight-vowel">${coreWord.substr(idx, target.length)}</span>` + 
                                  coreWord.substring(idx + target.length);
                    break; // Ưu tiên xử lý chuỗi mục tiêu đầu tiên được tìm thấy
                }
            }
            return highlighted + punctuation;
        }

        // ENGINE PHÁT ÂM GIỌNG MỸ CHUẨN - TỐC ĐỘ SƯ PHẠM CHẬM RÕ (0.7)
        function playAudio(textToSpeak, element, activeClass) {
            window.speechSynthesis.cancel(); // Tắt âm thanh đang chạy ngay lập tức khi bé bấm sang nút mới

            // Khôi phục lại trạng thái màu sắc bình thường của toàn bộ các thẻ
            document.querySelectorAll('.word-card, .play-all-btn, .clickable-word').forEach(el => {
                el.classList.remove('playing', 'playing-word');
            });

            if (element) {
                element.classList.add(activeClass);
            }

            // Làm sạch chuỗi ký tự đặc biệt giúp API Web Speech đọc mượt không bị vấp dấu câu
            let cleanText = textToSpeak.replace(/[.,?\/#!$%\^&\*;:{}=\-_`~()]/g, "");
            let utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = 'en-US'; 
            utterance.rate = 0.7; // Tốc độ 0.7 chuẩn cho các con tiểu học dễ bắt chước âm đuôi (ending sounds)

            utterance.onend = () => {
                if (element) {
                    element.classList.remove(activeClass);
                }
            };

            window.speechSynthesis.speak(utterance);
        }

        // TỰ ĐỘNG IN RA DANH SÁCH 24 TỪ VỰNG TAB 1
        function renderVocabulary() {
            const grid = document.getElementById('wordsGrid');
            grid.innerHTML = lesson11Data.words.map(item => `
                <div class="word-card" onclick="playAudio('${item.word}', this, 'playing')">
                    <div class="word-text">${highlightBlends(item.word)}</div>
                    <div class="ipa-text">${item.ipa}</div>
                    <div class="meaning-text">${item.meaning}</div>
                </div>
            `).join('');
        }

        // TỰ ĐỘNG IN RA ĐẦY ĐỦ 6 CÂU LUYỆN ĐỌC TƯƠNG TÁC TAB 2
        function renderSentences() {
            const list = document.getElementById('sentencesList');
            list.innerHTML = lesson11Data.sentences.map(item => {
                const wordsArray = item.sentence.split(' ');
                const wordsRowHtml = wordsArray.map(word => {
                    const cleanWord = word.replace(/[.,?]/g, "");
                    return `
                        <span class="clickable-word" onclick="event.stopPropagation(); playAudio('${cleanWord}', this, 'playing-word')">
                            ${highlightBlends(word)}
                        </span>
                    `;
                }).join('');

                return `
                    <div class="sentence-card border-style-${item.style}">
                        <button class="play-all-btn" onclick="playAudio('${item.sentence}', this, 'playing')">
                            🔊 Nghe Toàn Bộ Câu
                        </button>
                        <div class="sentence-words-row">
                            <span class="sentence-num">${item.num}</span>
                            ${wordsRowHtml}
                        </div>
                        <div class="sentence-translation">${item.meaning}</div>
                    </div>
                `;
            }).join('');
        }

        // ĐIỀU HƯỚNG CHUYỂN ĐỔI TAB BÀI HỌC
        function changeTab(tabName) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            window.speechSynthesis.cancel(); 

            if (tabName === 'words') {
                document.getElementById('sectionWords').classList.add('active');
                document.getElementById('tabWords').classList.add('active');
            } else {
                document.getElementById('sectionSentences').classList.add('active');
                document.getElementById('tabSentences').classList.add('active');
            }
        }

        window.onload = () => {
            renderVocabulary();
            renderSentences();
        };
    </script>
</body>
</html>
