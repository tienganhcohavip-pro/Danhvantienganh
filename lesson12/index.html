<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÉ LUYỆN ĐÁNH VẦN TIẾNG ANH - LESSON 12</title>
    <style>
        :root {
            --bg-app: #F0FDF4;          /* Màu xanh lá mầm dịu mắt học đường */
            --header-bg: #E0F2FE;       /* Xanh dương nhạt nguyên bản */
            --text-brand: #0369A1;      
            --text-main: #1E293B;      
            --vowel-red: #FF0000;       /* Màu đỏ nổi bật cho cụm phụ âm mục tiêu */
            --btn-word: #38BDF8;
            --btn-sentence: #FB923C;
            --card-bg: #FFFFFF;
            
            /* Màu viền khung câu tương thích theo ảnh đính kèm */
            --border-orange: #F97316;
            --border-blue: #38BDF8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        header {
            background-color: var(--header-bg);
            padding: 30px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 8px 24px rgba(3, 105, 161, 0.1);
        }

        header .main-title {
            color: var(--text-brand);
            font-size: 2.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0px #FFF;
        }

        header .sub-title {
            color: #0E7490;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        header .lesson-title {
            display: inline-block;
            background-color: #BAE6FD;
            color: #0369A1;
            padding: 10px 25px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 20px;
            border: 3px solid #7DD3FC;
        }

        .tab-menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 35px auto;
            max-width: 700px;
            padding: 0 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border: 3px solid #CBD5E1;
            border-radius: 24px;
            background-color: #E2E8F0;
            color: #475569;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .tab-btn.active {
            background-color: #0EA5E9;
            color: white;
            border-color: #0284C7;
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* Grid từ vựng */
        .words-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .words-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .word-card {
            background: var(--card-bg);
            border: 4px solid #E2E8F0;
            border-radius: 28px;
            padding: 30px 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
        }

        .word-card:hover {
            transform: translateY(-5px);
            border-color: var(--btn-word);
            box-shadow: 0 12px 20px rgba(56, 189, 248, 0.2);
        }

        .word-card.playing {
            border-color: var(--vowel-red);
            background-color: #FEF2F2;
        }

        .word-text {
            font-size: 3rem;
            font-weight: bold;
            color: #000;
            margin-bottom: 5px;
        }

        /* Điểm tập trung Phonics bôi đỏ chữ viết tiêu điểm */
        .highlight-vowel {
            color: var(--vowel-red) !important;
            font-weight: 800;
        }

        .ipa-text {
            font-size: 1.2rem;
            color: #0284C7;
            font-style: italic;
            font-weight: 600;
        }

        .meaning-text {
            font-size: 1.1rem;
            color: #64748B;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Khu vực câu luyện đọc */
        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .sentence-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 35px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.02);
            position: relative;
        }

        .border-style-orange { border: 4px solid var(--border-orange); }
        .border-style-blue { border: 4px solid var(--border-blue); }

        .play-all-btn {
            background-color: var(--btn-sentence);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: all 0.2s;
            box-shadow: 0 6px 15px rgba(251, 146, 60, 0.3);
        }

        .play-all-btn:hover {
            background-color: #EA580C;
            transform: scale(1.04);
        }

        .play-all-btn.playing {
            background-color: #10B981;
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3);
        }

        .sentence-words-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 18px;
            margin: 20px 0;
        }

        .sentence-num {
            font-weight: 800;
            color: var(--text-brand);
            font-size: 2.2rem;
            margin-right: 10px;
        }

        .clickable-word {
            display: inline-block;
            padding: 10px 22px;
            font-size: 2.2rem;
            font-weight: 700;
            background-color: #F8FAFC;
            border-radius: 20px;
            cursor: pointer;
            border: 3px solid #E2E8F0;
            transition: all 0.15s;
            user-select: none;
        }

        .clickable-word:hover {
            background-color: #F1F5F9;
            border-color: var(--btn-word);
            transform: scale(1.08);
        }

        .clickable-word.playing-word {
            background-color: #FEF2F2;
            border-color: var(--vowel-red);
            animation: bounce 0.3s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .sentence-translation {
            font-size: 1.3rem;
            color: #475569;
            font-style: italic;
            margin-top: 20px;
            font-weight: 600;
            border-top: 1px dashed #E2E8F0;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <div class="main-title">BÉ LUYỆN ĐÁNH VẦN TIẾNG ANH</div>
        <div class="sub-title">Tiếng anh cô Hà - Nhịp cầu nhỏ bước ra thế giới</div>
        <div class="lesson-title">Lesson 12: Phụ âm ghép & Âm đặc biệt /sk/, /sc/, /spr/, /str/, /spl/, /squ/, /s/, /dʒ/, /z/</div>
    </header>

    <div class="tab-menu">
        <button class="tab-btn active" id="tabWords" onclick="changeTab('words')">🔤 24 Từ Vựng Đánh Vần</button>
        <button class="tab-btn" id="tabSentences" onclick="changeTab('sentences')">📖 6 Câu Luyện Đọc</button>
    </div>

    <div class="container">
        
        <section id="sectionWords" class="content-section active">
            <div class="words-grid" id="wordsGrid">
                </div>
        </section>

        <section id="sectionSentences" class="content-section">
            <div class="sentence-list" id="sentencesList">
                </div>
        </section>

    </div>

    <script>
        // CƠ SỞ DỮ LIỆU TỪ VỰNG GIẢI MÃ CHÍNH XÁC TỪ IMAGE_E7E1FC.PNG THEO TỪ ĐIỂN OXFORD
        const lesson12Data = {
            words: [
                // Hàng 1: sk, sc
                { word: "sky", ipa: "/skaɪ/", meaning: "bầu trời" }, 
                { word: "desk", ipa: "/desk/", meaning: "bàn học, bàn làm việc" }, 
                { word: "scarf", ipa: "/skɑːf/", meaning: "khăn quàng cổ" }, 
                { word: "scooter", ipa: "/ˈskuːtə(r)/", meaning: "xe trượt scooter" },

                // Hàng 2: spr, str
                { word: "spring", ipa: "/sprɪŋ/", meaning: "mùa xuân" }, 
                { word: "spray", ipa: "/spreɪ/", meaning: "bình xịt / phun sương" }, 
                { word: "street", ipa: "/striːt/", meaning: "đường phố" }, 
                { word: "strawberry", ipa: "/ˈstrɔːbəri/", meaning: "quả dâu tây" },

                // Hàng 3: spl, squ
                { word: "splash", ipa: "/splæʃ/", meaning: "tiếng nước bắn / té nước" }, 
                { word: "split", ipa: "/splɪt/", meaning: "chia cắt / chẻ đôi" }, 
                { word: "square", ipa: "/skweə(r)/", meaning: "hình vuông" }, 
                { word: "squirrel", ipa: "/ˈskwɪrəl/", meaning: "con sóc" },

                // Hàng 4: Âm /s/ đại diện bằng chữ viết 'c' (Soft C)
                { word: "city", ipa: "/ˈsɪti/", meaning: "thành phố" }, 
                { word: "ice", ipa: "/aɪs/", meaning: "nước đá, băng" }, 
                { word: "face", ipa: "/feɪs/", meaning: "khuôn mặt" }, 
                { word: "pencil", ipa: "/ˈpensl/", meaning: "bút chì" },

                // Hàng 5: Âm /dʒ/ đại diện bằng chữ viết 'g' (Soft G) hoặc tổ hợp 'dge'
                { word: "page", ipa: "/peɪdʒ/", meaning: "trang sách" }, 
                { word: "giraffe", ipa: "/dʒəˈrɑːf/", meaning: "con hươu cao cổ" }, 
                { word: "badge", ipa: "/bædʒ/", meaning: "huy hiệu, phù hiệu" }, 
                { word: "bridge", ipa: "/brɪdʒ/", meaning: "cây cầu" },

                // Hàng 6: Âm /z/ đại diện bằng chữ viết 's' biến âm ở cuối từ
                { word: "rose", ipa: "/rəʊz/", meaning: "hoa hồng" }, 
                { word: "nose", ipa: "/nəʊz/", meaning: "cái mũi" }, 
                { word: "cheese", ipa: "/tʃiːz/", meaning: "phô mai" }, 
                { word: "legs", ipa: "/leɡz/", meaning: "đôi chân (số nhiều)" }
            ],
            sentences: [
                { num: "43.", sentence: "Look at the scooter and the blue scarf under the sky!", meaning: "Hãy nhìn chiếc xe trượt scooter và chiếc khăn quàng cổ màu xanh dương ở dưới bầu trời kìa!", style: "orange" },
                { num: "44.", sentence: "I walk on the street in spring to pick a strawberry.", meaning: "Tớ đi bộ trên đường phố vào mùa xuân để hái một quả dâu tây.", style: "blue" },
                { num: "45.", sentence: "A squirrel is on the square mat and makes a splash.", meaning: "Một chú sóc đang ở trên tấm thảm hình vuông và nghịch làm bắn nước tung tóe.", style: "orange" },
                { num: "46.", sentence: "The boy with a pencil on his face looks at the city.", meaning: "Cậu bé với một chiếc bút chì quệt trên khuôn mặt đang ngắm nhìn thành phố.", style: "blue" },
                { num: "47.", sentence: "The giraffe on this page has a shiny badge.", meaning: "Chú hươu cao cổ ở trên trang sách này có một chiếc huy hiệu lấp lánh.", style: "orange" },
                { num: "48.", sentence: "The rose is by her nose and she has long legs.", meaning: "Bông hoa hồng ở ngay cạnh chiếc mũi của cô ấy và cô ấy có đôi chân dài.", style: "blue" }
            ]
        };

        // THUẬT TOÁN AUTOMATIC PHONICS HIGHLIGHTER THÔNG MINH CHO LESSON 12
        function highlightBlends(text) {
            let coreWord = text.replace(/[.,?!]$/, ""); // Tách riêng dấu câu ở cuối từ
            let punctuation = text.substring(coreWord.length);
            let lowerWord = coreWord.toLowerCase();

            // Thứ tự ưu tiên kiểm tra từ chuỗi dài đến chuỗi ngắn để tránh đè vần
            const multiLetterTargets = ["spr", "str", "spl", "squ", "sk", "sc", "dge"];
            let highlighted = coreWord;
            let matched = false;

            // Bước 1: Quét các tổ hợp phụ âm ghép phức tạp trước
            for (let target of multiLetterTargets) {
                if (lowerWord.includes(target)) {
                    let idx = lowerWord.indexOf(target);
                    highlighted = coreWord.substring(0, idx) + 
                                  `<span class="highlight-vowel">${coreWord.substr(idx, target.length)}</span>` + 
                                  coreWord.substring(idx + target.length);
                    matched = true;
                    break;
                }
            }

            // Bước 2: Nếu chưa khớp nhóm trên, quét xử lý các biến âm đơn lẻ đặc biệt (Soft C, Soft G, S phát âm /z/)
            if (!matched) {
                // Áp dụng quy tắc ánh xạ cụ thể cho các từ đặc thù của Lesson 12
                if (["city", "ice", "face", "pencil"].includes(lowerWord)) {
                    let idx = lowerWord.indexOf("c");
                    highlighted = coreWord.substring(0, idx) + `<span class="highlight-vowel">c</span>` + coreWord.substring(idx + 1);
                } else if (["page", "giraffe"].includes(lowerWord)) {
                    let idx = lowerWord.indexOf("g");
                    highlighted = coreWord.substring(0, idx) + `<span class="highlight-vowel">g</span>` + coreWord.substring(idx + 1);
                } else if (["rose", "nose", "cheese"].includes(lowerWord)) {
                    // Đối với chữ s ở giữa/cuối biến thành /z/
                    let idx = lowerWord.lastIndexOf("s");
                    if(lowerWord === "cheese") idx = lowerWord.indexOf("s"); // từ cheese có 1 chữ s đơn ở vị trí áp chót
                    highlighted = coreWord.substring(0, idx) + `<span class="highlight-vowel">${coreWord.charAt(idx)}</span>` + coreWord.substring(idx + 1);
                } else if (lowerWord === "legs") {
                    let idx = lowerWord.indexOf("s");
                    highlighted = coreWord.substring(0, idx) + `<span class="highlight-vowel">s</span>` + coreWord.substring(idx + 1);
                }
            }

            return highlighted + punctuation;
        }

        // ENGINE PHÁT ÂM GIỌNG MỸ CHUẨN - TỐC ĐỘ SƯ PHẠM CHẬM RÕ (0.7)
        function playAudio(textToSpeak, element, activeClass) {
            window.speechSynthesis.cancel(); // Tắt âm thanh cũ ngay lập tức tránh chồng chéo khi bé bấm nhanh

            // Reset trạng thái màu sắc nhấp nháy của tất cả các khối
            document.querySelectorAll('.word-card, .play-all-btn, .clickable-word').forEach(el => {
                el.classList.remove('playing', 'playing-word');
            });

            if (element) {
                element.classList.add(activeClass);
            }

            // Làm sạch các ký tự đặc biệt giúp API Web Speech đọc mượt, chuẩn xác
            let cleanText = textToSpeak.replace(/[.,?!]/g, "");
            let utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = 'en-US'; 
            utterance.rate = 0.7; // Tốc độ sư phạm lý tưởng giúp bé nhận diện rõ ràng các âm đuôi khó như /s/, /z/, /dʒ/

            utterance.onend = () => {
                if (element) {
                    element.classList.remove(activeClass);
                }
            };

            window.speechSynthesis.speak(utterance);
        }

        // TỰ ĐỘNG IN RA DANH SÁCH 24 TỪ VỰNG TAB 1
        function renderVocabulary() {
            const grid = document.getElementById('wordsGrid');
            grid.innerHTML = lesson12Data.words.map(item => `
                <div class="word-card" onclick="playAudio('${item.word}', this, 'playing')">
                    <div class="word-text">${highlightBlends(item.word)}</div>
                    <div class="ipa-text">${item.ipa}</div>
                    <div class="meaning-text">${item.meaning}</div>
                </div>
            `).join('');
        }

        // TỰ ĐỘNG IN RA ĐẦY ĐỦ 6 CÂU LUYỆN ĐỌC TƯƠNG TÁC TAB 2
        function renderSentences() {
            const list = document.getElementById('sentencesList');
            list.innerHTML = lesson12Data.sentences.map(item => {
                const wordsArray = item.sentence.split(' ');
                const wordsRowHtml = wordsArray.map(word => {
                    const cleanWord = word.replace(/[.,?!]/g, "");
                    return `
                        <span class="clickable-word" onclick="event.stopPropagation(); playAudio('${cleanWord}', this, 'playing-word')">
                            ${highlightBlends(word)}
                        </span>
                    `;
                }).join('');

                return `
                    <div class="sentence-card border-style-${item.style}">
                        <button class="play-all-btn" onclick="playAudio('${item.sentence}', this, 'playing')">
                            🔊 Nghe Toàn Bộ Câu
                        </button>
                        <div class="sentence-words-row">
                            <span class="sentence-num">${item.num}</span>
                            ${wordsRowHtml}
                        </div>
                        <div class="sentence-translation">${item.meaning}</div>
                    </div>
                `;
            }).join('');
        }

        // ĐIỀU HƯỚNG CHUYỂN ĐỔI GIỮA HAI TAB BÀI HỌC
        function changeTab(tabName) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            window.speechSynthesis.cancel(); 

            if (tabName === 'words') {
                document.getElementById('sectionWords').classList.add('active');
                document.getElementById('tabWords').classList.add('active');
            } else {
                document.getElementById('sectionSentences').classList.add('active');
                document.getElementById('tabSentences').classList.add('active');
            }
        }

        window.onload = () => {
            renderVocabulary();
            renderSentences();
        };
    </script>
</body>
</html>
