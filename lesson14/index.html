<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÉ LUYỆN ĐÁNH VẦN TIẾNG ANH - LESSON 14</title>
    <style>
        :root {
            --bg-app: #F0FDF4;          /* Màu xanh lá mầm dịu mắt học đường */
            --header-bg: #E0F2FE;       /* Xanh dương nhạt nguyên bản */
            --text-brand: #0369A1;      
            --text-main: #1E293B;      
            --vowel-red: #FF0000;       /* Màu đỏ nổi bật cho cụm từ mục tiêu */
            --btn-word: #38BDF8;
            --btn-sentence: #FB923C;
            --card-bg: #FFFFFF;
            
            /* Màu viền khung câu tương thích theo ảnh đính kèm */
            --border-orange: #F97316;
            --border-blue: #38BDF8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        header {
            background-color: var(--header-bg);
            padding: 30px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 8px 24px rgba(3, 105, 161, 0.1);
        }

        header .main-title {
            color: var(--text-brand);
            font-size: 2.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0px #FFF;
        }

        header .sub-title {
            color: #0E7490;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        header .lesson-title {
            display: inline-block;
            background-color: #BAE6FD;
            color: #0369A1;
            padding: 10px 25px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 20px;
            border: 3px solid #7DD3FC;
        }

        .tab-menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 35px auto;
            max-width: 700px;
            padding: 0 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border: 3px solid #CBD5E1;
            border-radius: 24px;
            background-color: #E2E8F0;
            color: #475569;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .tab-btn.active {
            background-color: #0EA5E9;
            color: white;
            border-color: #0284C7;
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* Grid từ vựng */
        .words-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .words-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .word-card {
            background: var(--card-bg);
            border: 4px solid #E2E8F0;
            border-radius: 28px;
            padding: 30px 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
        }

        .word-card:hover {
            transform: translateY(-5px);
            border-color: var(--btn-word);
            box-shadow: 0 12px 20px rgba(56, 189, 248, 0.2);
        }

        .word-card.playing {
            border-color: var(--vowel-red);
            background-color: #FEF2F2;
        }

        .word-text {
            font-size: 3rem;
            font-weight: bold;
            color: #000;
            margin-bottom: 5px;
        }

        /* Điểm tập trung Phonics bôi đỏ chữ viết tiêu điểm */
        .highlight-vowel {
            color: var(--vowel-red) !important;
            font-weight: 800;
        }

        .ipa-text {
            font-size: 1.2rem;
            color: #0284C7;
            font-style: italic;
            font-weight: 600;
        }

        .meaning-text {
            font-size: 1.1rem;
            color: #64748B;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Khu vực câu luyện đọc */
        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .sentence-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 35px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.02);
            position: relative;
        }

        .border-style-orange { border: 4px solid var(--border-orange); }
        .border-style-blue { border: 4px solid var(--border-blue); }

        .play-all-btn {
            background-color: var(--btn-sentence);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: all 0.2s;
            box-shadow: 0 6px 15px rgba(251, 146, 60, 0.3);
        }

        .play-all-btn:hover {
            background-color: #EA580C;
            transform: scale(1.04);
        }

        .play-all-btn.playing {
            background-color: #10B981;
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3);
        }

        .sentence-words-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 18px;
            margin: 20px 0;
        }

        .sentence-num {
            font-weight: 800;
            color: var(--text-brand);
            font-size: 2.2rem;
            margin-right: 10px;
        }

        .clickable-word {
            display: inline-block;
            padding: 10px 22px;
            font-size: 2.2rem;
            font-weight: 700;
            background-color: #F8FAFC;
            border-radius: 20px;
            cursor: pointer;
            border: 3px solid #E2E8F0;
            transition: all 0.15s;
            user-select: none;
        }

        .clickable-word:hover {
            background-color: #F1F5F9;
            border-color: var(--btn-word);
            transform: scale(1.08);
        }

        .clickable-word.playing-word {
            background-color: #FEF2F2;
            border-color: var(--vowel-red);
            animation: bounce 0.3s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .sentence-translation {
            font-size: 1.3rem;
            color: #475569;
            font-style: italic;
            margin-top: 20px;
            font-weight: 600;
            border-top: 1px dashed #E2E8F0;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <div class="main-title">BÉ LUYỆN ĐÁNH VẦN TIẾNG ANH</div>
        <div class="sub-title">Tiếng anh cô Hà - Nhịp cầu nhỏ bước ra thế giới</div>
        <div class="lesson-title">Lesson 14: Kết hợp chữ /ɔː/, /ɔːl/, /wɔː/, /ɔːr/, /er/, /e/, /ɪə(r)/</div>
    </header>

    <div class="tab-menu">
        <button class="tab-btn active" id="tabWords" onclick="changeTab('words')">🔤 24 Từ Vựng Đánh Vần</button>
        <button class="tab-btn" id="tabSentences" onclick="changeTab('sentences')">📖 6 Câu Luyện Đọc</button>
    </div>

    <div class="container">
        
        <section id="sectionWords" class="content-section active">
            <div class="words-grid" id="wordsGrid">
                </div>
        </section>

        <section id="sectionSentences" class="content-section">
            <div class="sentence-list" id="sentencesList">
                </div>
        </section>

    </div>

    <script>
        // CƠ SỞ DỮ LIỆU TỪ VỰNG GIẢI MÃ CHÍNH XÁC TỪ IMAGE_E76DFD.PNG THEO TỪ ĐIỂN OXFORD
        const lesson14Data = {
            words: [
                // Hàng 1: au, aw -> /ɔː/
                { word: "sauce", ipa: "/sɔːs/", meaning: "nước sốt" }, 
                { word: "autumn", ipa: "/ˈɔːtəm/", meaning: "mùa thu" }, 
                { word: "straw", ipa: "/strɔː/", meaning: "ống hút / rơm rạ" }, 
                { word: "lawn", ipa: "/lɔːn/", meaning: "bãi cỏ" },

                // Hàng 2: all -> /ɔːl/, wa -> /wɔː/
                { word: "ball", ipa: "/bɔːl/", meaning: "quả bóng" }, 
                { word: "wall", ipa: "/wɔːl/", meaning: "bức tường" }, 
                { word: "water", ipa: "/ˈwɔːtə(r)/", meaning: "nước" }, 
                { word: "watch", ipa: "/wɒtʃ/", meaning: "đồng hồ đeo tay / xem" },

                // Hàng 3: or, ore -> /ɔːr/
                { word: "fork", ipa: "/fɔːk/", meaning: "cái dĩa, cái nĩa" }, 
                { word: "horse", ipa: "/hɔːs/", meaning: "con ngựa" }, 
                { word: "shore", ipa: "/ʃɔː(r)/", meaning: "bờ biển" }, 
                { word: "score", ipa: "/skɔː(r)/", meaning: "điểm số / ghi bàn" },

                // Hàng 4: air, are -> /er/
                { word: "chair", ipa: "/tʃeə(r)/", meaning: "cái ghế" }, 
                { word: "hair", ipa: "/heə(r)/", meaning: "mái tóc" }, 
                { word: "square", ipa: "/skweə(r)/", meaning: "hình vuông" }, 
                { word: "share", ipa: "/ʃeə(r)/", meaning: "chia sẻ" },

                // Hàng 5: ea -> /e/ ngắn đặc biệt
                { word: "bread", ipa: "/bred/", meaning: "bánh mì" }, 
                { word: "head", ipa: "/hed/", meaning: "cái đầu" }, 
                { word: "heavy", ipa: "/ˈhevi/", meaning: "nặng, nặng nề" }, 
                { word: "feather", ipa: "/ˈfeðə(r)/", meaning: "lông vũ" },

                // Hàng 6: ear, eer -> /ɪə(r)/
                { word: "ear", ipa: "/ɪə(r)/", meaning: "cái tai" }, 
                { word: "near", ipa: "/nɪə(r)/", meaning: "ở gần" }, 
                { word: "deer", ipa: "/dɪə(r)/", meaning: "con nai" }, 
                { word: "cheer", ipa: "/tʃɪə(r)/", meaning: "reo hò, cổ vũ" }
            ],
            sentences: [
                { num: "55.", sentence: "In autumn, I put some straw and sauce on the lawn.", meaning: "Vào mùa thu, tớ để một ít rơm và nước sốt ở trên bãi cỏ.", style: "orange" },
                { num: "56.", sentence: "Throw the ball to the wall and check your watch for water.", meaning: "Hãy ném quả bóng vào bức tường và xem đồng hồ của bạn xem có bị dính nước không.", style: "blue" },
                { num: "57.", sentence: "The horse on the shore saw a fork and made a score.", meaning: "Chú ngựa ở trên bờ biển nhìn thấy một chiếc nĩa và đã ghi được một điểm.", style: "orange" },
                { num: "58.", sentence: "Sit on the chair to cut your hair and share a square cake.", meaning: "Hãy ngồi trên ghế để cắt tóc và cùng chia sẻ một chiếc bánh ngọt hình vuông nhé.", style: "blue" },
                { num: "59.", sentence: "Don't put a heavy feather on your head or your bread!", meaning: "Đừng đặt một chiếc lông vũ nặng lên đầu hay lên chiếc bánh mì của bạn nhé!", style: "orange" },
                { num: "60.", sentence: "The deer is near my ear, so give a big cheer!", meaning: "Chú nai đang ở ngay sát tai của tớ, vì thế hãy reo hò thật lớn nào!", style: "blue" }
            ]
        };

        // THUẬT TOÁN AUTOMATIC PHONICS HIGHLIGHTER CHO LESSON 14
        function highlightBlends(text) {
            let coreWord = text.replace(/[.,?!]$/, ""); // Tách riêng dấu câu ở cuối từ
            let punctuation = text.substring(coreWord.length);
            let lowerWord = coreWord.toLowerCase();

            // Thứ tự ưu tiên quét từ chuỗi dài đến chuỗi ngắn để highlight chuẩn xác nhất
            const targets = ["ear", "eer", "air", "are", "all", "ore", "au", "aw", "wa", "or", "ea"];
            let highlighted = coreWord;

            for (let target of targets) {
                if (lowerWord.includes(target)) {
                    let idx = lowerWord.indexOf(target);
                    
                    // Ngoại lệ loại trừ: Tránh highlight nhầm chữ 'wa' trong từ 'autumn' hoặc 'straw'
                    if (target === "wa" && (lowerWord.includes("straw") || lowerWord.includes("autumn"))) {
                        continue;
                    }
                    
                    // Cắt chuỗi và bọc thẻ màu đỏ rực cho tổ hợp mục tiêu được tìm thấy
                    highlighted = coreWord.substring(0, idx) + 
                                  `<span class="highlight-vowel">${coreWord.substr(idx, target.length)}</span>` + 
                                  coreWord.substring(idx + target.length);
                    break; // Chỉ xử lý một cụm mục tiêu đầu tiên tìm thấy trong từ
                }
            }

            return highlighted + punctuation;
        }

        // ENGINE PHÁT ÂM GIỌNG MỸ CHUẨN - TỐC ĐỘ SƯ PHẠM CHẬM RÕ (0.7)
        function playAudio(textToSpeak, element, activeClass) {
            window.speechSynthesis.cancel(); // Tắt âm thanh cũ ngay lập tức tránh chồng chéo

            // Reset trạng thái màu sắc nhấp nháy của tất cả các khối
            document.querySelectorAll('.word-card, .play-all-btn, .clickable-word').forEach(el => {
                el.classList.remove('playing', 'playing-word');
            });

            if (element) {
                element.classList.add(activeClass);
            }

            // Làm sạch các ký tự đặc biệt giúp API Web Speech đọc mượt, chuẩn xác
            let cleanText = textToSpeak.replace(/[.,?!]/g, "");
            let utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = 'en-US'; 
            utterance.rate = 0.7; // Tốc độ sư phạm 0.7 lý tưởng để các con nghe rõ nguyên âm dài và biến âm khó

            utterance.onend = () => {
                if (element) {
                    element.classList.remove(activeClass);
                }
            };

            window.speechSynthesis.speak(utterance);
        }

        // TỰ ĐỘNG IN RA DANH SÁCH 24 TỪ VỰNG TAB 1
        function renderVocabulary() {
            const grid = document.getElementById('wordsGrid');
            grid.innerHTML = lesson14Data.words.map(item => `
                <div class="word-card" onclick="playAudio('${item.word}', this, 'playing')">
                    <div class="word-text">${highlightBlends(item.word)}</div>
                    <div class="ipa-text">${item.ipa}</div>
                    <div class="meaning-text">${item.meaning}</div>
                </div>
            `).join('');
        }

        // TỰ ĐỘNG IN RA ĐẦY ĐỦ 6 CÂU LUYỆN ĐỌC TƯƠNG TÁC TAB 2
        function renderSentences() {
            const list = document.getElementById('sentencesList');
            list.innerHTML = lesson14Data.sentences.map(item => {
                const wordsArray = item.sentence.split(' ');
                const wordsRowHtml = wordsArray.map(word => {
                    const cleanWord = word.replace(/[.,?!]/g, "");
                    return `
                        <span class="clickable-word" onclick="event.stopPropagation(); playAudio('${cleanWord}', this, 'playing-word')">
                            ${highlightBlends(word)}
                        </span>
                    `;
                }).join('');

                return `
                    <div class="sentence-card border-style-${item.style}">
                        <button class="play-all-btn" onclick="playAudio('${item.sentence}', this, 'playing')">
                            🔊 Nghe Toàn Bộ Câu
                        </button>
                        <div class="sentence-words-row">
                            <span class="sentence-num">${item.num}</span>
                            ${wordsRowHtml}
                        </div>
                        <div class="sentence-translation">${item.meaning}</div>
                    </div>
                `;
            }).join('');
        }

        // ĐIỀU HƯỚNG CHUYỂN ĐỔI GIỮA HAI TAB BÀI HỌC
        function changeTab(tabName) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            window.speechSynthesis.cancel(); 

            if (tabName === 'words') {
                document.getElementById('sectionWords').classList.add('active');
                document.getElementById('tabWords').classList.add('active');
            } else {
                document.getElementById('sectionSentences').classList.add('active');
                document.getElementById('tabSentences').classList.add('active');
            }
        }

        window.onload = () => {
            renderVocabulary();
            renderSentences();
        };
    </script>
</body>
</html>
