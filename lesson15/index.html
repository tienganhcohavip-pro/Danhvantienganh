<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÉ LUYỆN ĐÁNH VẦN TIẾNG ANH - LESSON 15</title>
    <style>
        :root {
            --bg-app: #F0FDF4;          
            --header-bg: #E0F2FE;       
            --text-brand: #0369A1;      
            --text-main: #1E293B;      
            --vowel-red: #FF0000;       
            --btn-word: #38BDF8;
            --btn-sentence: #FB923C;
            --card-bg: #FFFFFF;
            
            --border-orange: #F97316;
            --border-blue: #38BDF8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        header {
            background-color: var(--header-bg);
            padding: 30px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 8px 24px rgba(3, 105, 161, 0.1);
        }

        header .main-title {
            color: var(--text-brand);
            font-size: 2.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0px #FFF;
        }

        header .sub-title {
            color: #0E7490;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        header .lesson-title {
            display: inline-block;
            background-color: #BAE6FD;
            color: #0369A1;
            padding: 10px 25px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 20px;
            border: 3px solid #7DD3FC;
        }

        .tab-menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 35px auto;
            max-width: 700px;
            padding: 0 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border: 3px solid #CBD5E1;
            border-radius: 24px;
            background-color: #E2E8F0;
            color: #475569;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .tab-btn.active {
            background-color: #0EA5E9;
            color: white;
            border-color: #0284C7;
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .words-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .words-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .word-card {
            background: var(--card-bg);
            border: 4px solid #E2E8F0;
            border-radius: 28px;
            padding: 30px 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
        }

        .word-card:hover {
            transform: translateY(-5px);
            border-color: var(--btn-word);
            box-shadow: 0 12px 20px rgba(56, 189, 248, 0.2);
        }

        .word-card.playing {
            border-color: var(--vowel-red);
            background-color: #FEF2F2;
        }

        .word-text {
            font-size: 3rem;
            font-weight: bold;
            color: #000;
            margin-bottom: 5px;
        }

        .highlight-vowel {
            color: var(--vowel-red) !important;
            font-weight: 800;
        }

        .ipa-text {
            font-size: 1.2rem;
            color: #0284C7;
            font-style: italic;
            font-weight: 600;
        }

        .meaning-text {
            font-size: 1.1rem;
            color: #64748B;
            margin-top: 10px;
            font-weight: bold;
        }

        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .sentence-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 35px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.02);
            position: relative;
        }

        .border-style-orange { border: 4px solid var(--border-orange); }
        .border-style-blue { border: 4px solid var(--border-blue); }

        .play-all-btn {
            background-color: var(--btn-sentence);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: all 0.2s;
            box-shadow: 0 6px 15px rgba(251, 146, 60, 0.3);
        }

        .play-all-btn:hover {
            background-color: #EA580C;
            transform: scale(1.04);
        }

        .play-all-btn.playing {
            background-color: #10B981;
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3);
        }

        .sentence-words-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 18px;
            margin: 20px 0;
        }

        .sentence-num {
            font-weight: 800;
            color: var(--text-brand);
            font-size: 2.2rem;
            margin-right: 10px;
        }

        .clickable-word {
            display: inline-block;
            padding: 10px 22px;
            font-size: 2.2rem;
            font-weight: 700;
            background-color: #F8FAFC;
            border-radius: 20px;
            cursor: pointer;
            border: 3px solid #E2E8F0;
            transition: all 0.15s;
            user-select: none;
        }

        .clickable-word:hover {
            background-color: #F1F5F9;
            border-color: var(--btn-word);
            transform: scale(1.08);
        }

        .clickable-word.playing-word {
            background-color: #FEF2F2;
            border-color: var(--vowel-red);
            animation: bounce 0.3s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .sentence-translation {
            font-size: 1.3rem;
            color: #475569;
            font-style: italic;
            margin-top: 20px;
            font-weight: 600;
            border-top: 1px dashed #E2E8F0;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <div class="main-title">BÉ LUYỆN ĐÁNH VẦN TIẾNG ANH</div>
        <div class="sub-title">Tiếng anh cô Hà - Nhịp cầu nhỏ bước ra thế giới</div>
        <div class="lesson-title">Lesson 15: Kết hợp âm /ei/, /i/, /ai/, /əʊ/, /ju/, /a/, /ə/, /ʌ/ (Nguyên âm mở)</div>
    </header>

    <div class="tab-menu">
        <button class="tab-btn active" id="tabWords" onclick="changeTab('words')">🔤 24 Từ Vựng Đánh Vần</button>
        <button class="tab-btn" id="tabSentences" onclick="changeTab('sentences')">📖 6 Câu Luyện Đọc</button>
    </div>

    <div class="container">
        
        <section id="sectionWords" class="content-section active">
            <div class="words-grid" id="wordsGrid"></div>
        </section>

        <section id="sectionSentences" class="content-section">
            <div class="sentence-list" id="sentencesList"></div>
        </section>

    </div>

    <script>
        const lesson15Data = {
            words: [
                // Hàng 1: /ei/
                { word: "acorn", ipa: "/ˈeɪkɔːn/", meaning: "quả sồi" }, 
                { word: "baby", ipa: "/ˈbeɪbi/", meaning: "em bé" }, 
                { word: "lady", ipa: "/ˈleɪdi/", meaning: "quý bà, phụ nữ" }, 
                { word: "elevator", ipa: "/ˈelɪveɪtə(r)/", meaning: "thang máy" },

                // Hàng 2: /iː/, /aɪ/
                { word: "he", ipa: "/hiː/", meaning: "anh ấy" }, 
                { word: "she", ipa: "/ʃiː/", meaning: "cô ấy" }, 
                { word: "tiger", ipa: "/ˈtaɪɡə(r)/", meaning: "con hổ" }, 
                { word: "child", ipa: "/tʃaɪld/", meaning: "đứa trẻ" },

                // Hàng 3: /əʊ/, /juː/
                { word: "cold", ipa: "/kəʊld/", meaning: "lạnh" }, 
                { word: "hotel", ipa: "/həʊˈtel/", meaning: "khách sạn" }, 
                { word: "uniform", ipa: "/ˈjuːnɪfɔːm/", meaning: "đồng phục" }, 
                { word: "music", ipa: "/ˈmjuːzɪk/", meaning: "âm nhạc" },

                // Hàng 4: /ə/
                { word: "panda", ipa: "/ˈpændə/", meaning: "gấu trúc" }, 
                { word: "gorilla", ipa: "/ɡəˈrɪlə/", meaning: "con khỉ đột" }, 
                { word: "banana", ipa: "/bəˈnɑːnə/", meaning: "quả chuối" }, 
                { word: "umbrella", ipa: "/ʌmˈbrelə/", meaning: "cái ô, cái dù" },

                // Hàng 5: /ə/
                { word: "chicken", ipa: "/ˈtʃɪkɪn/", meaning: "con gà" }, 
                { word: "pencil", ipa: "/ˈpensl/", meaning: "bút chì" }, 
                { word: "lemon", ipa: "/ˈlemən/", meaning: "quả chanh vàng" }, 
                { word: "surprise", ipa: "/səˈpraɪz/", meaning: "sự ngạc nhiên" },

                // Hàng 6: /ʌ/
                { word: "monkey", ipa: "/ˈmʌŋki/", meaning: "con khỉ" }, 
                { word: "love", ipa: "/lʌv/", meaning: "yêu, thương" }, 
                { word: "son", ipa: "/sʌn/", meaning: "con trai" }, 
                { word: "honey", ipa: "/ˈhʌni/", meaning: "mật ong" }
            ],
            sentences: [
                { num: "61.", sentence: "The lady and her baby have a big acorn.", meaning: "Quý bà và em bé của cô ấy có một quả sồi lớn.", style: "orange" },
                { num: "62.", sentence: "He has a tiger and she has a child.", meaning: "Anh ấy có một con hổ và cô ấy có một đứa trẻ.", style: "orange" },
                { num: "63.", sentence: "I wear my uniform and play music in the hotel.", meaning: "Tớ mặc bộ đồng phục của mình và chơi nhạc ở trong khách sạn.", style: "blue" },
                { num: "64.", sentence: "A panda and a gorilla eat banana under an umbrella.", meaning: "Một chú gấu trúc và một chú khỉ đột ăn chuối ở dưới một cái ô.", style: "blue" },
                { num: "65.", sentence: "A chicken, a pencil and a lemon. What a surprise!", meaning: "Một con gà, một chiếc bút chì và một quả chanh. Thật là một sự ngạc nhiên!", style: "orange" },
                { num: "66.", sentence: "My son loves monkey and he loves honey.", meaning: "Con trai của tớ yêu thích con khỉ và cậu bé cũng rất thích mật ong.", style: "blue" }
            ]
        };

        // ĐÃ CẬP NHẬT TỌA ĐỘ CHÍNH XÁC ĐỂ BÔI ĐỎ ĐÚNG KÝ TỰ MỤC TIÊU
        function highlightBlends(text) {
            let coreWord = text.replace(/[.,?!]$/, ""); 
            let punctuation = text.substring(coreWord.length);
            let lowerWord = coreWord.toLowerCase();

            let highlighted = coreWord;

            const highlightMap = {
                "acorn": [0],      // a
                "baby": [1],       // b[a]by
                "lady": [1],       // l[a]dy
                "elevator": [4],   // elev[a]tor
                "he": [1],         // h[e]
                "she": [2],        // sh[e]
                "tiger": [1],      // t[i]ger
                "child": [2],      // ch[i]ld
                "cold": [1],       // c[o]ld
                "hotel": [1],      // h[o]tel
                "uniform": [0],    // [u]niform
                "music": [1],      // m[u]sing -> m[u]sic
                "panda": [4],      // pand[a]
                "gorilla": [6],    // gorill[a]
                "banana": [5],     // banan[a]
                "umbrella": [7],   // umbrell[a]
                "chicken": [5],    // chick[e]n
                "pencil": [4],     // penc[i]l
                "lemon": [3],      // lem[o]n
                "surprise": [1],   // s[u]rprise
                "monkey": [1],     // m[o]nkey
                "love": [1],       // l[o]ve
                "son": [1],        // s[o]n
                "honey": [1]       // h[o]ney
            };

            if (highlightMap[lowerWord]) {
                let targetIndices = highlightMap[lowerWord];
                let charArray = coreWord.split("");
                
                targetIndices.forEach(idx => {
                    if(charArray[idx]) {
                        charArray[idx] = `<span class="highlight-vowel">${charArray[idx]}</span>`;
                    }
                });
                highlighted = charArray.join("");
            }

            return highlighted + punctuation;
        }

        function playAudio(textToSpeak, element, activeClass) {
            window.speechSynthesis.cancel(); 

            document.querySelectorAll('.word-card, .play-all-btn, .clickable-word').forEach(el => {
                el.classList.remove('playing', 'playing-word');
            });

            if (element) {
                element.classList.add(activeClass);
            }

            let cleanText = textToSpeak.replace(/[.,?!]/g, "");
            let utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = 'en-US'; 
            utterance.rate = 0.7; 

            utterance.onend = () => {
                if (element) {
                    element.classList.remove(activeClass);
                }
            };

            window.speechSynthesis.speak(utterance);
        }

        function renderVocabulary() {
            const grid = document.getElementById('wordsGrid');
            grid.innerHTML = lesson15Data.words.map(item => `
                <div class="word-card" onclick="playAudio('${item.word}', this, 'playing')">
                    <div class="word-text">${highlightBlends(item.word)}</div>
                    <div class="ipa-text">${item.ipa}</div>
                    <div class="meaning-text">${item.meaning}</div>
                </div>
            `).join('');
        }

        function renderSentences() {
            const list = document.getElementById('sentencesList');
            list.innerHTML = lesson15Data.sentences.map(item => {
                const wordsArray = item.sentence.split(' ');
                const wordsRowHtml = wordsArray.map(word => {
                    const cleanWord = word.replace(/[.,?!]/g, "");
                    return `
                        <span class="clickable-word" onclick="event.stopPropagation(); playAudio('${cleanWord}', this, 'playing-word')">
                            ${highlightBlends(word)}
                        </span>
                    `;
                }).join('');

                return `
                    <div class="sentence-card border-style-${item.style}">
                        <button class="play-all-btn" onclick="playAudio('${item.sentence}', this, 'playing')">
                            🔊 Nghe Toàn Bộ Câu
                        </button>
                        <div class="sentence-words-row">
                            <span class="sentence-num">${item.num}</span>
                            ${wordsRowHtml}
                        </div>
                        <div class="sentence-translation">${item.meaning}</div>
                    </div>
                `;
            }).join('');
        }

        function changeTab(tabName) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            window.speechSynthesis.cancel(); 

            if (tabName === 'words') {
                document.getElementById('sectionWords').classList.add('active');
                document.getElementById('tabWords').classList.add('active');
            } else {
                document.getElementById('sectionSentences').classList.add('active');
                document.getElementById('tabSentences').classList.add('active');
            }
        }

        window.onload = () => {
            renderVocabulary();
            renderSentences();
        };
    </script>
</body>
</html>
