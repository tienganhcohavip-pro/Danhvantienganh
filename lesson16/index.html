<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÉ LUYỆN ĐÁNH VẦN TIẾNG ANH - LESSON 16</title>
    <style>
        :root {
            --bg-app: #F0FDF4;          
            --header-bg: #E0F2FE;       
            --text-brand: #0369A1;      
            --text-main: #1E293B;      
            --vowel-red: #FF0000;       
            --btn-word: #38BDF8;
            --btn-sentence: #FB923C;
            --card-bg: #FFFFFF;
            
            --border-orange: #F97316;
            --border-purple: #A855F7;
            --border-blue: #38BDF8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        header {
            background-color: var(--header-bg);
            padding: 30px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 8px 24px rgba(3, 105, 161, 0.1);
        }

        header .main-title {
            color: var(--text-brand);
            font-size: 2.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0px #FFF;
        }

        header .sub-title {
            color: #0E7490;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        header .lesson-title {
            display: inline-block;
            background-color: #BAE6FD;
            color: #0369A1;
            padding: 10px 25px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 20px;
            border: 3px solid #7DD3FC;
        }

        .tab-menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 35px auto;
            max-width: 700px;
            padding: 0 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border: 3px solid #CBD5E1;
            border-radius: 24px;
            background-color: #E2E8F0;
            color: #475569;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .tab-btn.active {
            background-color: #0EA5E9;
            color: white;
            border-color: #0284C7;
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .words-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .words-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .word-card {
            background: var(--card-bg);
            border: 4px solid #E2E8F0;
            border-radius: 28px;
            padding: 30px 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
        }

        .word-card:hover {
            transform: translateY(-5px);
            border-color: var(--btn-word);
            box-shadow: 0 12px 20px rgba(56, 189, 248, 0.2);
        }

        .word-card.playing {
            border-color: var(--vowel-red);
            background-color: #FEF2F2;
        }

        .word-text {
            font-size: 3rem;
            font-weight: bold;
            color: #000;
            margin-bottom: 5px;
        }

        .highlight-vowel {
            color: var(--vowel-red) !important;
            font-weight: 800;
        }

        .ipa-text {
            font-size: 1.2rem;
            color: #0284C7;
            font-style: italic;
            font-weight: 600;
        }

        .meaning-text {
            font-size: 1.1rem;
            color: #64748B;
            margin-top: 10px;
            font-weight: bold;
        }

        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .sentence-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 35px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.02);
            position: relative;
        }

        .border-style-orange { border: 4px solid var(--border-orange); }
        .border-style-purple { border: 4px solid var(--border-purple); }
        .border-style-blue { border: 4px solid var(--border-blue); }

        .play-all-btn {
            background-color: var(--btn-sentence);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: all 0.2s;
            box-shadow: 0 6px 15px rgba(251, 146, 60, 0.3);
        }

        .play-all-btn:hover {
            background-color: #EA580C;
            transform: scale(1.04);
        }

        .play-all-btn.playing {
            background-color: #10B981;
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3);
        }

        .sentence-words-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 18px;
            margin: 20px 0;
        }

        .sentence-num {
            font-weight: 800;
            color: var(--text-brand);
            font-size: 2.2rem;
            margin-right: 10px;
        }

        .clickable-word {
            display: inline-block;
            padding: 10px 22px;
            font-size: 2.2rem;
            font-weight: 700;
            background-color: #F8FAFC;
            border-radius: 20px;
            cursor: pointer;
            border: 3px solid #E2E8F0;
            transition: all 0.15s;
            user-select: none;
        }

        .clickable-word:hover {
            background-color: #F1F5F9;
            border-color: var(--btn-word);
            transform: scale(1.08);
        }

        .clickable-word.playing-word {
            background-color: #FEF2F2;
            border-color: var(--vowel-red);
            animation: bounce 0.3s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .sentence-translation {
            font-size: 1.3rem;
            color: #475569;
            font-style: italic;
            margin-top: 20px;
            font-weight: 600;
            border-top: 1px dashed #E2E8F0;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <div class="main-title">BÉ LUYỆN ĐÁNH VẦN TIẾNG ANH</div>
        <div class="sub-title">Tiếng anh cô Hà - Nhịp cầu nhỏ bước ra thế giới</div>
        <div class="lesson-title">Lesson 16: Âm câm & Cụm vần đặc biệt</div>
    </header>

    <div class="tab-menu">
        <button class="tab-btn active" id="tabWords" onclick="changeTab('words')">🔤 24 Từ Vựng Đánh Vần</button>
        <button class="tab-btn" id="tabSentences" onclick="changeTab('sentences')">📖 6 Câu Luyện Đọc</button>
    </div>

    <div class="container">
        
        <!-- SECTION 24 TỪ VỰNG -->
        <section id="sectionWords" class="content-section active">
            <div class="words-grid" id="wordsGrid"></div>
        </section>

        <!-- SECTION 6 CÂU LUYỆN ĐỌC -->
        <section id="sectionSentences" class="content-section">
            <div class="sentence-list" id="sentencesList"></div>
        </section>

    </div>

    <script>
        const lesson16Data = {
            words: [
                // Hàng 1: kn, wr
                { word: "knife", ipa: "/naɪf/", meaning: "con dao" }, 
                { word: "knee", ipa: "/niː/", meaning: "đầu gối" }, 
                { word: "write", ipa: "/raɪt/", meaning: "viết" }, 
                { word: "wrong", ipa: "/rɒŋ/", meaning: "sai" },

                // Hàng 2: mb, ve (Cập nhật: glove và live bôi đỏ chữ e)
                { word: "lamb", ipa: "/læm/", meaning: "con cừu non" }, 
                { word: "comb", ipa: "/kəʊm/", meaning: "cái lược" }, 
                { word: "glove", ipa: "/ɡlʌv/", meaning: "găng tay" }, 
                { word: "live", ipa: "/lɪv/", meaning: "sống / ở" },

                // Hàng 3: rh, wh, st (Cập nhật: whistle bôi đỏ st)
                { word: "rhino", ipa: "/ˈraɪnəʊ/", meaning: "con tê giác" }, 
                { word: "rhubarb", ipa: "/ˈruːbɑːb/", meaning: "cây đại hoàng" }, 
                { word: "whistle", ipa: "/ˈwɪsl/", meaning: "cái còi / thổi còi" }, 
                { word: "castle", ipa: "/ˈkɑːsl/", meaning: "lâu đài" },

                // Hàng 4: -ture, -sure
                { word: "picture", ipa: "/ˈpɪktʃə(r)/", meaning: "bức tranh" }, 
                { word: "nature", ipa: "/ˈneɪtʃə(r)/", meaning: "tự nhiên" }, 
                { word: "treasure", ipa: "/ˈtreʒə(r)/", meaning: "kho báu" }, 
                { word: "measure", ipa: "/ˈmeʒə(r)/", meaning: "đo lường" },

                // Hàng 5: -tion, -sion
                { word: "station", ipa: "/ˈsteɪʃn/", meaning: "nhà ga / trạm" }, 
                { word: "competition", ipa: "/ˌkɒmpəˈtɪʃn/", meaning: "cuộc thi" }, 
                { word: "television", ipa: "/ˈtelɪvɪʒn/", meaning: "ti-vi" }, 
                { word: "excursion", ipa: "/ɪkˈskɜːʃn/", meaning: "chuyến tham quan" },

                // Hàng 6: -ous, -ful
                { word: "famous", ipa: "/ˈfeɪməs/", meaning: "nổi tiếng" }, 
                { word: "dangerous", ipa: "/ˈdeɪndʒərəs/", meaning: "nguy hiểm" }, 
                { word: "beautiful", ipa: "/ˈbjuːtɪfl/", meaning: "xinh đẹp" }, 
                { word: "helpful", ipa: "/ˈhelpfl/", meaning: "hay giúp đỡ" }
            ],
            sentences: [
                { num: "67.", sentence: "It's wrong to play with a knife on your knee.", meaning: "Chơi với một con dao trên đầu gối của con là sai đấy nhé.", style: "orange" },
                { num: "68.", sentence: "I live with a lamb a comb and a glove.", meaning: "Tớ sống cùng với một chú cừu non, một cái lược và một chiếc găng tay.", style: "orange" },
                { num: "69.", sentence: "The rhino in the castle has rhubarb and a whistle.", meaning: "Con tê giác ở trong lâu đài có cây đại hoàng và một cái còi.", style: "purple" },
                { num: "70.", sentence: "I measure the picture of the treasure.", meaning: "Tớ đo kích thước bức tranh của kho báu.", style: "blue" },
                { num: "71.", sentence: "I watch the competition on the television.", meaning: "Tớ xem cuộc thi ở trên ti-vi.", style: "orange" },
                { num: "72.", sentence: "The famous singer is beautiful and helpful.", meaning: "Người ca sĩ nổi tiếng ấy vừa xinh đẹp lại vừa hay giúp đỡ mọi người.", style: "blue" }
            ]
        };

        // HIGHLIGHT CHÍNH XÁC CÁC CHỮ CÁI THEO YÊU CẦU MỚI
        function highlightBlends(text) {
            let coreWord = text.replace(/[.,?!']$/, ""); 
            let punctuation = text.substring(coreWord.length);
            let lowerWord = coreWord.toLowerCase();

            if (text.includes("It's")) {
                return `<span class="highlight-vowel">It</span>'s`;
            }

            let highlighted = coreWord;

            const highlightMap = {
                "knife": [0, 1],         // [kn]ife
                "knee": [0, 1],          // [kn]ee
                "write": [0, 1],         // [wr]ite
                "wrong": [0, 1],         // [wr]ong
                "lamb": [2, 3],          // la[mb]
                "comb": [2, 3],          // co[mb]
                "glove": [4],            // glov[e] -> Sửa đổi: chỉ bôi đỏ chữ e cuối
                "live": [3],             // liv[e]  -> Sửa đổi: chỉ bôi đỏ chữ e cuối
                "rhino": [0, 1],         // [rh]ino
                "rhubarb": [0, 1],       // [rh]ubarb
                "whistle": [3, 4],       // whi[st]le -> Sửa đổi: bôi đỏ cụm st thay vì wh
                "castle": [2, 3],        // ca[st]le
                "picture": [3, 4, 5, 6],   // pic[ture]
                "nature": [2, 3, 4, 5],    // na[ture]
                "treasure": [4, 5, 6, 7],  // trea[sure]
                "measure": [3, 4, 5, 6],   // mea[sure]
                "station": [3, 4, 5, 6],   // sta[tion]
                "competition": [7, 8, 9, 10], // competi[tion]
                "television": [6, 7, 8, 9],   // televi[sion]
                "excursion": [5, 6, 7, 8],    // excur[sion]
                "famous": [3, 4, 5],       // fam[ous]
                "dangerous": [6, 7, 8],     // danger[ous]
                "beautiful": [6, 7, 8],    // beauti[ful]
                "helpful": [4, 5, 6]       // help[ful]
            };

            if (highlightMap[lowerWord]) {
                let targetIndices = highlightMap[lowerWord];
                let charArray = coreWord.split("");
                
                targetIndices.forEach(idx => {
                    if(charArray[idx]) {
                        charArray[idx] = `<span class="highlight-vowel">${charArray[idx]}</span>`;
                    }
                });
                highlighted = charArray.join("");
            }

            return highlighted + punctuation;
        }

        // PHÁT ÂM AUDIO VỚI TỐC ĐỘ 0.7 CHUẨN SƯ PHẠM
        function playAudio(textToSpeak, element, activeClass) {
            window.speechSynthesis.cancel(); 

            document.querySelectorAll('.word-card, .play-all-btn, .clickable-word').forEach(el => {
                el.classList.remove('playing', 'playing-word');
            });

            if (element) {
                element.classList.add(activeClass);
            }

            let cleanText = textToSpeak.replace(/[.,?!]/g, "");
            let utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = 'en-US'; 
            utterance.rate = 0.7; 

            utterance.onend = () => {
                if (element) {
                    element.classList.remove(activeClass);
                }
            };

            window.speechSynthesis.speak(utterance);
        }

        function renderVocabulary() {
            const grid = document.getElementById('wordsGrid');
            grid.innerHTML = lesson16Data.words.map(item => `
                <div class="word-card" onclick="playAudio('${item.word}', this, 'playing')">
                    <div class="word-text">${highlightBlends(item.word)}</div>
                    <div class="ipa-text">${item.ipa}</div>
                    <div class="meaning-text">${item.meaning}</div>
                </div>
            `).join('');
        }

        function renderSentences() {
            const list = document.getElementById('sentencesList');
            list.innerHTML = lesson16Data.sentences.map(item => {
                const wordsArray = item.sentence.split(' ');
                const wordsRowHtml = wordsArray.map(word => {
                    const cleanWord = word.replace(/[.,?!]/g, "");
                    return `
                        <span class="clickable-word" onclick="event.stopPropagation(); playAudio('${cleanWord}', this, 'playing-word')">
                            ${highlightBlends(word)}
                        </span>
                    `;
                }).join('');

                return `
                    <div class="sentence-card border-style-${item.style}">
                        <button class="play-all-btn" onclick="playAudio('${item.sentence}', this, 'playing')">
                            🔊 Nghe Toàn Bộ Câu
                        </button>
                        <div class="sentence-words-row">
                            <span class="sentence-num">${item.num}</span>
                            ${wordsRowHtml}
                        </div>
                        <div class="sentence-translation">${item.meaning}</div>
                    </div>
                `;
            }).join('');
        }

        function changeTab(tabName) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            window.speechSynthesis.cancel(); 

            if (tabName === 'words') {
                document.getElementById('sectionWords').classList.add('active');
                document.getElementById('tabWords').classList.add('active');
            } else {
                document.getElementById('sectionSentences').classList.add('active');
                document.getElementById('tabSentences').classList.add('active');
            }
        }

        window.onload = () => {
            renderVocabulary();
            renderSentences();
        };
    </script>
</body>
</html>
