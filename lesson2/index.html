<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 2: Short Vowel a /æ/</title>
    <style>
        /* --- GIAO DIỆN CHUẨN ĐỒNG BỘ 100% VỚI LESSON 1 --- */
        :root {
            --bg-app: #F5FCFF;
            --header-bg: #FFD166;
            --text-main: #2B2D42;
            --vowel-red: #FF0000; /* Bôi đỏ rực rỡ nổi bật nguyên âm */
            --btn-word: #4EA8DE;
            --btn-sentence: #FF9F43;
            --border-color: #E2ECEF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            padding-bottom: 60px;
        }

        header {
            background-color: var(--header-bg);
            padding: 20px;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        header h1 {
            color: #118AB2;
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        header p {
            color: #073B4C;
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Thanh Chuyển Tab Học Tập */
        .tab-menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px auto;
            max-width: 600px;
            padding: 0 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid #BDD7EE;
            border-radius: 16px;
            background-color: #E1EDF9;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: #06D6A0;
            color: white;
            border-color: #04b386;
            box-shadow: 0 4px 12px rgba(6, 214, 160, 0.3);
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* --- LAYOUT CỐ ĐỊNH CHUẨN: 6 HÀNG x 4 CỘT --- */
        .words-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* Đảm bảo luôn cố định đúng 4 cột một hàng */
            gap: 18px;
            margin-top: 10px;
        }

        /* Hỗ trợ hiển thị trên màn hình nhỏ di động */
        @media (max-width: 650px) {
            .words-grid {
                grid-template-columns: repeat(2, 1fr); 
            }
        }

        .word-card {
            background: white;
            border: 3px solid #E2ECEF;
            border-radius: 24px;
            padding: 22px 12px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 140px; /* Độ cao đồng đều cho các card */
        }

        .word-card:hover {
            transform: translateY(-5px);
            border-color: var(--btn-word);
            box-shadow: 0 6px 12px rgba(78, 168, 222, 0.15);
        }

        .word-card.playing {
            border-color: var(--vowel-red);
            background-color: #FFEBEF;
        }

        /* Chữ hiển thị từ vựng tiếng Anh chính */
        .word-text {
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            color: #000;
            line-height: 1.2;
        }

        /* Định dạng bôi đỏ nguyên âm 'a' */
        .highlight-vowel {
            color: var(--vowel-red) !important;
            font-weight: 800;
        }

        /* Phiên âm IPA */
        .ipa-text {
            font-size: 1rem;
            color: #4EA8DE;
            font-style: italic;
            margin-top: 2px;
            font-weight: 500;
        }

        /* Định dạng phần dịch nghĩa Tiếng Việt (chữ nhỏ hơn, nằm phía dưới) */
        .meaning-text {
            font-size: 0.95rem;
            color: #6C757D; /* Màu xám nhẹ nhàng tinh tế */
            margin-top: 8px;
            font-weight: 500;
        }

        /* --- PHẦN 2: LUYỆN ĐỌC CÂU (SENTENCES) --- */
        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sentence-card {
            background: white;
            border: 3px solid #DFF6FF;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .play-all-btn {
            background-color: var(--btn-sentence);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background-color 0.2s;
        }

        .play-all-btn:hover {
            background-color: #e68a2e;
        }

        .play-all-btn.playing {
            background-color: #06D6A0;
        }

        .sentence-words-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 12px;
            margin: 15px 0;
        }

        .clickable-word {
            display: inline-block;
            padding: 6px 14px;
            font-size: 1.6rem;
            font-weight: 600;
            background-color: #F0F4F8;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #D0D8e0;
            transition: all 0.1s;
            user-select: none;
        }

        .clickable-word:hover {
            background-color: #E1E9F0;
        }

        .sentence-translation {
            font-size: 1.1rem;
            color: #777;
            font-style: italic;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Short Vowel a /æ/</h1>
        <p>24 Từ vựng (Kèm Nghĩa Oxford) & 3 Câu cuối trang 3 🌟</p>
    </header>

    <div class="tab-menu">
        <button class="tab-btn active" id="tabWords" onclick="changeTab('words')">🔤 24 Từ vựng (6 Hàng)</button>
        <button class="tab-btn" id="tabSentences" onclick="changeTab('sentences')">📖 3 Câu cuối trang 3</button>
    </div>

    <div class="container">
        
        <section id="sectionWords" class="content-section active">
            <div class="words-grid" id="wordsGrid">
                </div>
        </section>

        <section id="sectionSentences" class="content-section">
            <div class="sentence-list" id="sentencesList">
                </div>
        </section>

    </div>

    <script>
        // DATA NỘI DUNG CHUẨN XÁC THEO TỪ ĐIỂN OXFORD
        const lesson2Data = {
            words: [
                // Hàng 1
                { word: "ram", ipa: "/ræm/", meaning: "con cừu đực" }, 
                { word: "jam", ipa: "/dʒæm/", meaning: "mứt quả" }, 
                { word: "dam", ipa: "/dæm/", meaning: "đập chắn nước" }, 
                { word: "yam", ipa: "/jæm/", meaning: "khoai mỡ / khoai lang" },
                // Hàng 2
                { word: "fan", ipa: "/fæn/", meaning: "cái quạt" }, 
                { word: "man", ipa: "/mæn/", meaning: "người đàn ông" }, 
                { word: "pan", ipa: "/pæn/", meaning: "cái chảo rán" }, 
                { word: "can", ipa: "/kæn/", meaning: "cái lon / hộp thiếc" },
                // Hàng 3
                { word: "dad", ipa: "/dæd/", meaning: "bố / ba" }, 
                { word: "pad", ipa: "/pæd/", meaning: "tập giấy / đệm lót" }, 
                { word: "bag", ipa: "/bæg/", meaning: "cặp sách / cái túi" }, 
                { word: "rag", ipa: "/ræg/", meaning: "vải rách / giẻ lau" },
                // Hàng 4
                { word: "tap", ipa: "/tæp/", meaning: "vòi nước" }, 
                { word: "nap", ipa: "/næp/", meaning: "giấc ngủ ngắn" }, 
                { word: "map", ipa: "/mæp/", meaning: "bản đồ" }, 
                { word: "cap", ipa: "/kæp/", meaning: "mũ lưỡi trai" },
                // Hàng 5
                { word: "rat", ipa: "/ræt/", meaning: "con chuột cống" }, 
                { word: "bat", ipa: "/bæt/", image: "images/bat.png", meaning: "con dơi / cái chày" }, 
                { word: "hat", ipa: "/hæt/", meaning: "cái mũ (có vành)" }, 
                { word: "mat", ipa: "/mæt/", meaning: "tấm thảm / chiếc chiếu" },
                // Hàng 6
                { word: "van", ipa: "/væn/", meaning: "xe tải nhỏ / xe bán tải" }, 
                { word: "sad", ipa: "/sæd/", meaning: "buồn bã" }, 
                { word: "tag", ipa: "/tæg/", meaning: "nhãn mác / thẻ giá" }, 
                { word: "lap", ipa: "/læp/", meaning: "vòng chạy / lòng (đùi)" }
            ],
            sentences: [
                { id: "s1", sentence: "A ram is on the dam.", meaning: "Một con cừu đực ở trên con đập." },
                { id: "s2", sentence: "The ram has a yam.", meaning: "Con cừu đực có một củ khoai mỡ." },
                { id: "s3", sentence: "The jam is on the yam.", meaning: "Mứt ở trên củ khoai mỡ." }
            ]
        };

        // BỘ MÁY PHÁT ÂM TIẾNG ANH CHUẨN MỸ ĐỘC LẬP
        function playSound(textToRead, element, activeClass) {
            window.speechSynthesis.cancel(); // Tắt ngay âm thanh cũ để tránh chồng chéo khi bấm nhanh
            
            document.querySelectorAll('.word-card, .play-all-btn').forEach(el => el.classList.remove('playing'));

            if (element) {
                element.classList.add(activeClass);
            }

            // Làm sạch văn bản để tránh lỗi phát âm ký tự đặc biệt
            let cleanText = textToRead.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()\/]/g, "");
            let utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = 'en-US'; 
            utterance.rate = 0.8; // THIẾT LẬP TỐC ĐỘ ĐỌC 0.8 CHẬM RÃI, RÕ RÀNG

            utterance.onend = () => {
                if (element) {
                    element.classList.remove(activeClass);
                }
            };

            window.speechSynthesis.speak(utterance);
        }

        // TỰ ĐỘNG BÔI ĐỎ TOÀN BỘ CHỮ A HOẶC a
        function highlightLetterA(text) {
            return text.split('').map(char => {
                if (char.toLowerCase() === 'a') {
                    return `<span class="highlight-vowel">${char}</span>`;
                }
                return char;
            }).join('');
        }

        // ĐỔ NỘI DUNG TỪ VỰNG LÊN GRID (CÓ NGHĨA TIẾNG VIỆT PHÍA DƯỚI)
        function loadWords() {
            const grid = document.getElementById('wordsGrid');
            grid.innerHTML = lesson2Data.words.map(item => `
                <div class="word-card" onclick="playSound('${item.word}', this, 'playing')">
                    <div class="word-text">${highlightLetterA(item.word)}</div>
                    <div class="ipa-text">${item.ipa}</div>
                    <div class="meaning-text">${item.meaning}</div>
                </div>
            `).join('');
        }

        // ĐỔ NỘI DUNG LUYỆN ĐỌC CÂU ĐA ĐIỂM TƯƠNG TÁC
        function loadSentences() {
            const list = document.getElementById('sentencesList');
            
            list.innerHTML = lesson2Data.sentences.map(item => {
                const wordsArray = item.sentence.split(' ');
                const wordsRowHtml = wordsArray.map(word => {
                    const clean = word.replace(/[.,]/g, "").toLowerCase();
                    return `
                        <span class="clickable-word" onclick="event.stopPropagation(); playSound('${clean}', null, null)">
                            ${highlightLetterA(word)}
                        </span>
                    `;
                }).join('');

                return `
                    <div class="sentence-card">
                        <button class="play-all-btn" onclick="playSound('${item.sentence}', this, 'playing')">
                            🔊 Đọc cả câu
                        </button>
                        <div class="sentence-words-row">${wordsRowHtml}</div>
                        <div class="sentence-translation">${item.meaning}</div>
                    </div>
                `;
            }).join('');
        }

        // CHUYỂN ĐỔI TAB QUA LẠI GIỮA TỪ VỰNG VÀ ĐỌC CÂU
        function changeTab(tabName) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            window.speechSynthesis.cancel(); 

            if (tabName === 'words') {
                document.getElementById('sectionWords').classList.add('active');
                document.getElementById('tabWords').classList.add('active');
            } else {
                document.getElementById('sectionSentences').classList.add('active');
                document.getElementById('tabSentences').classList.add('active');
            }
        }

        window.onload = () => {
            loadWords();
            loadSentences();
        };
    </script>
</body>
</html>
