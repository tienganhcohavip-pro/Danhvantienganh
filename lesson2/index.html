<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 2: Short Vowel a /æ/</title>
    <style>
        /* --- GIAO DIỆN CHUẨN ĐỒNG BỘ LESSON 1 --- */
        :root {
            --bg-app: #F5FCFF;
            --header-bg: #FFD166;
            --text-main: #2B2D42;
            --vowel-red: #FF0000;
            --btn-word: #4EA8DE;
            --btn-sentence: #FF9F43;
            --border-color: #E2ECEF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            padding-bottom: 60px;
        }

        header {
            background-color: var(--header-bg);
            padding: 20px;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        header h1 {
            color: #118AB2;
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        header p {
            color: #073B4C;
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Thanh Chuyển Tab Học Tập */
        .tab-menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px auto;
            max-width: 600px;
            padding: 0 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid #BDD7EE;
            border-radius: 16px;
            background-color: #E1EDF9;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: #06D6A0;
            color: white;
            border-color: #04b386;
            box-shadow: 0 4px 12px rgba(6, 214, 160, 0.3);
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* --- LAYOUT CỐ ĐỊNH CHUẨN: 6 HÀNG x 4 CỘT --- */
        .words-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 10px;
        }

        @media (max-width: 650px) {
            .words-grid {
                grid-template-columns: repeat(2, 1fr); 
            }
        }

        .word-card {
            background: white;
            border: 3px solid #E2ECEF;
            border-radius: 24px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .word-card:hover {
            transform: translateY(-5px);
            border-color: var(--btn-word);
        }

        .word-card.playing {
            border-color: var(--vowel-red);
            background-color: #FFEBEF;
        }

        /* Khung chứa ảnh minh họa */
        .word-image-container {
            width: 100%;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            background-color: #F8F9FA;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            border: 1px dashed #D0D8E0;
        }

        .word-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 4px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2; /* Đè lên trên phần đồ họa CSS nếu có file ảnh thật */
            background: transparent;
        }

        /* --- BỘ VẼ ĐỒ HỌA CSS CARD MINH HỌA (CSS WORD ART) --- */
        .css-art {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            z-index: 1;
        }

        /* Hình mẫu đại diện một số hình vẽ nổi bật */
        .art-ram { width: 50px; height: 40px; background: #D2B48C; border-radius: 50% 50% 40% 40%; box-shadow: -15px -5px 0 -2px #FFF, 15px -5px 0 -2px #FFF; position: relative; } /* Con cừu */
        .art-ram::before { content: '🐏'; font-size: 3rem; position: absolute; top: -15px; left: -2px; }
        
        .art-jam { width: 45px; height: 55px; background: #FF4D6D; border-radius: 8px; position: relative; border: 3px solid #FF758F; } /* Lọ mứt */
        .art-jam::before { content: ""; width: 49px; height: 10px; background: #FFB3C1; position: absolute; top: -8px; left: -5px; border-radius: 4px; }
        .art-jam::after { content: "Jam"; font-size: 10px; color: white; background: #C9184A; padding: 1px 4px; position: absolute; top: 15px; left: 3px; font-weight: bold; border-radius: 3px; }

        .art-dam { width: 70px; height: 45px; background: #8D99AE; border-radius: 4px; position: relative; clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%); } /* Con đập chắn nước */
        .art-dam::before { content: ""; width: 100%; height: 15px; background: #00B4D8; position: absolute; bottom: 0; }

        .art-yam { width: 65px; height: 35px; background: #9E2A2B; border-radius: 50% 15% 50% 15%; transform: rotate(-15deg); } /* Củ khoai lang/khoai mỡ */

        .art-fan { width: 55px; height: 55px; border: 3px solid #4CC9F0; border-radius: 50%; position: relative; animation: spin 4s linear infinite; } /* Cái quạt quay */
        .art-fan::before, .art-fan::after { content: ""; background: #4CC9F0; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .art-fan::before { width: 45px; height: 10px; border-radius: 5px; }
        .art-fan::after { width: 10px; height: 45px; border-radius: 5px; }

        .art-man { font-size: 3rem; } .art-man::before { content: "👨"; }
        .art-can { width: 40px; height: 60px; background: #90E0EF; border-radius: 8px; border: 2px solid #0077B6; position: relative; } /* Lon nước ngọt */
        .art-can::before { content: ""; width: 30px; height: 6px; background: #FFF; position: absolute; top: 4px; left: 3px; border-radius: 2px; }

        .art-pan { width: 55px; height: 30px; background: #2B2D42; border-radius: 0 0 20px 20px; position: relative; } /* Chảo rán */
        .art-pan::before { content: ""; width: 35px; height: 6px; background: #2B2D42; position: absolute; top: 0; right: -32px; border-radius: 3px; }

        .art-dad { font-size: 3rem; } .art-dad::before { content: "🧔"; }
        .art-pad { width: 45px; height: 55px; background: #FFF; border: 2px solid #6C757D; box-shadow: 3px 3px 0 #E9ECEF; border-radius: 4px; position: relative; } /* Tập giấy viết */
        .art-pad::before { content: ""; width: 100%; height: 8px; background: #DC3545; position: absolute; top: 0; left: 0; }

        .art-bag { width: 50px; height: 45px; background: #FFB703; border-radius: 12px; position: relative; margin-top: 10px; } /* Cặp sách */
        .art-bag::before { content: ""; width: 30px; height: 20px; border: 3px solid #FFB703; border-bottom: none; position: absolute; top: -16px; left: 7px; border-radius: 10px 10px 0 0; }

        .art-rag { width: 50px; height: 45px; background: #A8DADC; clip-path: polygon(10% 10%, 90% 0%, 100% 85%, 75% 70%, 50% 90%, 20% 75%, 0% 100%); } /* Giẻ lau rách */

        .art-tap { font-size: 3rem; } .art-tap::before { content: "🚰"; }
        .art-nap { font-size: 3.2rem; } .art-nap::before { content: "💤"; }
        
        .art-map { width: 60px; height: 45px; background: #E9D8A6; border: 2px solid #94D2BD; position: relative; display: grid; grid-template-columns: repeat(3, 1fr); overflow:hidden; } /* Bản đồ đường đi */
        .art-map::before { content: "📍"; font-size: 14px; position: absolute; top: 10px; left: 20px; z-index: 3; }
        
        .art-cap { width: 55px; height: 30px; background: #EE6C4D; border-radius: 30px 30px 0 0; position: relative; } /* Mũ lưỡi trai */
        .art-cap::before { content: ""; width: 30px; height: 6px; background: #EE6C4D; position: absolute; bottom: 0; right: -20px; border-radius: 0 10px 10px 0; }

        .art-rat { font-size: 3rem; } .art-rat::before { content: "🐀"; }
        .art-bat { font-size: 3.2rem; } .art-bat::before { content: "🦇"; }
        .art-hat { width: 55px; height: 35px; background: #3D5A80; border-radius: 10px 10px 0 0; position: relative; } /* Mũ ảo thuật gia */
        .art-hat::before { content: ""; width: 75px; height: 6px; background: #293241; position: absolute; bottom: -4px; left: -10px; border-radius: 3px; }

        .art-mat { width: 65px; height: 40px; background: #BC6C25; border: 3px dashed #DDA15E; border-radius: 4px; } /* Thảm chùi chân */
        .art-van { font-size: 3rem; } .art-van::before { content: "🚐"; }
        .art-sad { font-size: 3rem; } .art-sad::before { content: "😢"; }
        .art-tag { width: 35px; height: 50px; background: #E0AAFF; border-radius: 4px; position: relative; clip-path: polygon(30% 0%, 70% 0%, 100% 25%, 100% 100%, 0% 100%, 0% 25%); } /* Thẻ mác quần áo */
        .art-tag::before { content: ""; width: 6px; height: 6px; background: white; border-radius: 50%; position: absolute; top: 6px; left: 14px; }

        .art-lap { font-size: 3rem; } .art-lap::before { content: "💻"; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- PHẦN LUYỆN ĐỌC CÂU (SENTENCES) --- */
        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sentence-card {
            background: white;
            border: 3px solid #DFF6FF;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .play-all-btn {
            background-color: var(--btn-sentence);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background-color 0.2s;
        }

        .play-all-btn:hover {
            background-color: #e68a2e;
        }

        .play-all-btn.playing {
            background-color: #06D6A0;
        }

        .sentence-words-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 12px;
            margin: 15px 0;
        }

        .clickable-word {
            display: inline-block;
            padding: 6px 14px;
            font-size: 1.6rem;
            font-weight: 600;
            background-color: #F0F4F8;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #D0D8e0;
            transition: all 0.1s;
            user-select: none;
        }

        .clickable-word:hover {
            background-color: #E1E9F0;
        }

        .sentence-translation {
            font-size: 1.1rem;
            color: #777;
            font-style: italic;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Short Vowel a /æ/</h1>
        <p>24 Từ vựng nâng cao & 3 Câu cuối trang 3 🌟</p>
    </header>

    <div class="tab-menu">
        <button class="tab-btn active" id="tabWords" onclick="changeTab('words')">🔤 24 Từ vựng (6 Hàng)</button>
        <button class="tab-btn" id="tabSentences" onclick="changeTab('sentences')">📖 3 Câu cuối trang 3</button>
    </div>

    <div class="container">
        
        <section id="sectionWords" class="content-section active">
            <div class="words-grid" id="wordsGrid">
                </div>
        </section>

        <section id="sectionSentences" class="content-section">
            <div class="sentence-list" id="sentencesList">
                </div>
        </section>

    </div>

    <script>
        // DATA NỘI DUNG CHUẨN XÁC: 24 TỪ VÀ 3 CÂU CUỐI TRANG 3
        const lesson2Data = {
            words: [
                // Hàng 1
                { word: "ram", ipa: "/ræm/", image: "images/ram.png", cssClass: "art-ram" }, 
                { word: "jam", ipa: "/dʒæm/", image: "images/jam.png", cssClass: "art-jam" }, 
                { word: "dam", ipa: "/dæm/", image: "images/dam.png", cssClass: "art-dam" }, 
                { word: "yam", ipa: "/jæm/", image: "images/yam.png", cssClass: "art-yam" },
                // Hàng 2
                { word: "fan", ipa: "/fæn/", image: "images/fan.png", cssClass: "art-fan" }, 
                { word: "man", ipa: "/mæn/", image: "images/man.png", cssClass: "art-man" }, 
                { word: "pan", ipa: "/pæn/", image: "images/pan.png", cssClass: "art-pan" }, 
                { word: "can", ipa: "/kæn/", image: "images/can.png", cssClass: "art-can" },
                // Hàng 3
                { word: "dad", ipa: "/dæd/", image: "images/dad.png", cssClass: "art-dad" }, 
                { word: "pad", ipa: "/pæd/", image: "images/pad.png", cssClass: "art-pad" }, 
                { word: "bag", ipa: "/bæg/", image: "images/bag.png", cssClass: "art-bag" }, 
                { word: "rag", ipa: "/ræg/", image: "images/rag.png", cssClass: "art-rag" },
                // Hàng 4
                { word: "tap", ipa: "/tæp/", image: "images/tap.png", cssClass: "art-tap" }, 
                { word: "nap", ipa: "/næp/", image: "images/nap.png", cssClass: "art-nap" }, 
                { word: "map", ipa: "/mæp/", image: "images/map.png", cssClass: "art-map" }, 
                { word: "cap", ipa: "/kæp/", image: "images/cap.png", cssClass: "art-cap" },
                // Hàng 5
                { word: "rat", ipa: "/ræt/", image: "images/rat.png", cssClass: "art-rat" }, 
                { word: "bat", ipa: "/bæt/", image: "images/bat.png", cssClass: "art-bat" }, 
                { word: "hat", ipa: "/hæt/", image: "images/hat.png", cssClass: "art-hat" }, 
                { word: "mat", ipa: "/mæt/", image: "images/mat.png", cssClass: "art-mat" },
                // Hàng 6
                { word: "van", ipa: "/væn/", image: "images/van.png", cssClass: "art-van" }, 
                { word: "sad", ipa: "/sæd/", image: "images/sad.png", cssClass: "art-sad" }, 
                { word: "tag", ipa: "/tæg/", image: "images/tag.png", cssClass: "art-tag" }, 
                { word: "lap", ipa: "/læp/", image: "images/lap.png", cssClass: "art-lap" }
            ],
            sentences: [
                { id: "s1", sentence: "A ram is on the dam.", meaning: "Một con cừu đực ở trên con đập." },
                { id: "s2", sentence: "The ram has a yam.", meaning: "Con cừu đực có một củ khoai mỡ." },
                { id: "s3", sentence: "The jam is on the yam.", meaning: "Mứt ở trên củ khoai mỡ." }
            ]
        };

        // BỘ MÁY PHÁT ÂM TIẾNG ANH CHUẨN MỸ
        function playSound(textToRead, element, activeClass) {
            window.speechSynthesis.cancel(); 
            
            document.querySelectorAll('.word-card, .play-all-btn').forEach(el => el.classList.remove('playing'));

            if (element) {
                element.classList.add(activeClass);
            }

            let cleanText = textToRead.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()\/]/g, "");
            let utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = 'en-US'; 
            utterance.rate = 0.8; // TỐC ĐỘ 0.8 CHẬM RÃI ĐỂ TRẺ DỄ NGHE ÂM ĐUÔI

            utterance.onend = () => {
                if (element) {
                    element.classList.remove(activeClass);
                }
            };

            window.speechSynthesis.speak(utterance);
        }

        // TỰ ĐỘNG BÔI ĐỎ TOÀN BỘ CHỮ A/a
        function highlightLetterA(text) {
            return text.split('').map(char => {
                if (char.toLowerCase() === 'a') {
                    return `<span class="highlight-vowel">${char}</span>`;
                }
                return char;
            }).join('');
        }

        // ĐỔ DỮ LIỆU LÊN GRID (HIỂN THỊ CSS ART NẾU CHƯA CÓ FILE ẢNH THẬT)
        function loadWords() {
            const grid = document.getElementById('wordsGrid');
            grid.innerHTML = lesson2Data.words.map(item => `
                <div class="word-card" onclick="playSound('${item.word}', this, 'playing')">
                    <div class="word-image-container">
                        <div class="css-art">
                            <div class="${item.cssClass}"></div>
                        </div>
                        <img src="${item.image}" alt="${item.word}" class="word-image" onerror="this.style.display='none'">
                    </div>
                    <div>
                        <div class="word-text">${highlightLetterA(item.word)}</div>
                        <div class="ipa-text">${item.ipa}</div>
                    </div>
                </div>
            `).join('');
        }

        // ĐỔ DỮ LIỆU LUYỆN ĐỌC CÂU ĐA ĐIỂM
        function loadSentences() {
            const list = document.getElementById('sentencesList');
            
            list.innerHTML = lesson2Data.sentences.map(item => {
                const wordsArray = item.sentence.split(' ');
                const wordsRowHtml = wordsArray.map(word => {
                    const clean = word.replace(/[.,]/g, "").toLowerCase();
                    return `
                        <span class="clickable-word" onclick="event.stopPropagation(); playSound('${clean}', null, null)">
                            ${highlightLetterA(word)}
                        </span>
                    `;
                }).join('');

                return `
                    <div class="sentence-card">
                        <button class="play-all-btn" onclick="playSound('${item.sentence}', this, 'playing')">
                            🔊 Đọc cả câu
                        </button>
                        <div class="sentence-words-row">${wordsRowHtml}</div>
                        <div class="sentence-translation">${item.meaning}</div>
                    </div>
                `;
            }).join('');
        }

        // ĐIỀU HƯỚNG CHUYỂN TAB QUA LẠI
        function changeTab(tabName) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            window.speechSynthesis.cancel(); 

            if (tabName === 'words') {
                document.getElementById('sectionWords').classList.add('active');
                document.getElementById('tabWords').classList.add('active');
            } else {
                document.getElementById('sectionSentences').classList.add('active');
                document.getElementById('tabSentences').classList.add('active');
            }
        }

        window.onload = () => {
            loadWords();
            loadSentences();
        };
    </script>
</body>
</html>
