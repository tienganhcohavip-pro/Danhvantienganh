<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Học Tiếng Anh - Short Vowel a</title>
    <style>
        /* --- THIẾT KẾ ĐỒNG BỘ, THÂN THIỆN VỚI TRẺ EM --- */
        :root {
            --bg-app: #F5FCFF;
            --header-bg: #FFD166;
            --text-main: #2B2D42;
            --vowel-red: #FF0000; /* Bôi đỏ rực rỡ giúp bé tập trung vào nguyên âm */
            --btn-word: #4EA8DE;
            --btn-sentence: #FF9F43;
            --border-color: #E2ECEF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            padding-bottom: 60px;
        }

        header {
            background-color: var(--header-bg);
            padding: 20px;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        header h1 {
            color: #118AB2;
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        header p {
            color: #073B4C;
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Thanh Chuyển Tab Lớn Dễ Bấm */
        .tab-menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px auto;
            max-width: 600px;
            padding: 0 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid #BDD7EE;
            border-radius: 20px;
            background-color: #E1EDF9;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: #06D6A0;
            color: white;
            border-color: #04b386;
            box-shadow: 0 5px 15px rgba(6, 214, 160, 0.4);
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* --- LAYOUT 6 HÀNG x 4 CỘT CỐ ĐỊNH (TRANG 3) --- */
        .words-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 10px;
        }

        /* Tối ưu hiển thị trên màn hình máy tính bảng/điện thoại nằm ngang */
        @media (max-width: 768px) {
            .words-grid {
                grid-template-columns: repeat(2, 1fr); 
            }
        }

        .word-card {
            background: white;
            border: 3px solid #E2ECEF;
            border-radius: 24px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150px;
        }

        .word-card:hover {
            transform: translateY(-5px);
            border-color: var(--btn-word);
            box-shadow: 0 6px 12px rgba(78, 168, 222, 0.2);
        }

        /* Hiệu ứng đổi màu viền khi từ đang được đọc */
        .word-card.playing {
            border-color: var(--vowel-red);
            background-color: #FFEBEF;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.02); }
        }

        /* Chữ hiển thị từ vựng tiếng Anh lớn, rõ ràng */
        .word-text {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: #000;
        }

        /* Thẻ CSS bôi đỏ nguyên âm 'a' */
        .highlight-vowel {
            color: var(--vowel-red) !important;
            font-weight: 800;
        }

        /* Phiên âm quốc tế IPA */
        .ipa-text {
            font-size: 1.1rem;
            color: #4EA8DE;
            font-style: italic;
            margin-top: 3px;
            font-weight: 500;
        }

        /* Dịch nghĩa Oxford chuẩn */
        .meaning-text {
            font-size: 1rem;
            color: #6C757D;
            margin-top: 10px;
            font-weight: 500;
        }

        /* --- PHẦN BÀI TẬP LUYỆN ĐỌC CÂU (TRANG 4) --- */
        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .sentence-card {
            background: white;
            border: 3px solid #DFF6FF;
            border-radius: 28px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }

        /* Nút đọc nguyên câu */
        .play-all-btn {
            background-color: var(--btn-sentence);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(255, 159, 67, 0.3);
        }

        .play-all-btn:hover {
            background-color: #e68a2e;
            transform: scale(1.05);
        }

        .play-all-btn.playing {
            background-color: #06D6A0;
            box-shadow: 0 4px 10px rgba(6, 214, 160, 0.3);
        }

        /* Hàng chứa các từ đơn lẻ trong câu */
        .sentence-words-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px 15px;
            margin: 20px 0;
        }

        /* Từng từ trong câu có thể click để nghe lẻ */
        .clickable-word {
            display: inline-block;
            padding: 8px 18px;
            font-size: 1.8rem;
            font-weight: 600;
            background-color: #F0F4F8;
            border-radius: 16px;
            cursor: pointer;
            border: 2px solid #D0D8e0;
            transition: all 0.1s;
            user-select: none;
        }

        .clickable-word:hover {
            background-color: #E1E9F0;
            border-color: var(--btn-word);
            color: var(--btn-word);
        }

        .clickable-word.playing-word {
            background-color: #FFEBEF;
            border-color: var(--vowel-red);
        }

        /* Nghĩa của câu dịch */
        .sentence-translation {
            font-size: 1.2rem;
            color: #555;
            font-style: italic;
            margin-top: 15px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bé Luyện Đánh Vần Tiếng Anh</h1>
        <p>Short Vowel a /æ/ • Tốc độ đọc chậm 0.7 🐢</p>
    </header>

    <div class="tab-menu">
        <button class="tab-btn active" id="tabWords" onclick="changeTab('words')">🔤 Trang 3: 24 Từ Vựng</button>
        <button class="tab-btn" id="tabSentences" onclick="changeTab('sentences')">📖 Trang 4: 3 Câu Luyện Đọc</button>
    </div>

    <div class="container">
        
        <!-- TAP 1: 24 TỪ VỰNG TRANG 3 -->
        <section id="sectionWords" class="content-section active">
            <div class="words-grid" id="wordsGrid">
                <!-- Data nạp tự động từ JS -->
            </div>
        </section>

        <!-- TAB 2: 3 CÂU CUỐI TRANG 4 -->
        <section id="sectionSentences" class="content-section">
            <div class="sentence-list" id="sentencesList">
                <!-- Data nạp tự động từ JS -->
            </div>
        </section>

    </div>

    <script>
        // CƠ SỞ DỮ LIỆU CHUẨN OXFORD
        const lesson2Data = {
            words: [
                // Hàng 1
                { word: "ram", ipa: "/ræm/", meaning: "con cừu đực" }, 
                { word: "jam", ipa: "/dʒæm/", meaning: "mứt quả" }, 
                { word: "dam", ipa: "/dæm/", meaning: "đập chắn nước" }, 
                { word: "yam", ipa: "/jæm/", meaning: "khoai mỡ" },
                // Hàng 2
                { word: "fan", ipa: "/fæn/", meaning: "cái quạt" }, 
                { word: "man", ipa: "/mæn/", meaning: "người đàn ông" }, 
                { word: "pan", ipa: "/pæn/", meaning: "cái chảo rán" }, 
                { word: "can", ipa: "/kæn/", meaning: "cái lon / hộp thiếc" },
                // Hàng 3
                { word: "dad", ipa: "/dæd/", meaning: "bố / ba" }, 
                { word: "pad", ipa: "/pæd/", meaning: "tập giấy ghi chép" }, 
                { word: "bag", ipa: "/bæg/", meaning: "cái túi / cặp sách" }, 
                { word: "rag", ipa: "/ræg/", meaning: "giẻ lau / vải rách" },
                // Hàng 4
                { word: "tap", ipa: "/tæp/", meaning: "vòi nước" }, 
                { word: "nap", ipa: "/næp/", meaning: "giấc ngủ ngắn" }, 
                { word: "map", ipa: "/mæp/", meaning: "bản đồ" }, 
                { word: "cap", ipa: "/kæp/", meaning: "mũ lưỡi trai" },
                // Hàng 5
                { word: "rat", ipa: "/ræt/", meaning: "con chuột cống" }, 
                { word: "bat", ipa: "/bæt/", meaning: "con dơi / cái chày" }, 
                { word: "hat", ipa: "/hæt/", meaning: "cái mũ có vành" }, 
                { word: "mat", ipa: "/mæt/", meaning: "tấm thảm / chiếu" },
                // Hàng 6
                { word: "van", ipa: "/væn/", meaning: "xe tải nhỏ" }, 
                { word: "sad", ipa: "/sæd/", meaning: "buồn bã" }, 
                { word: "tag", ipa: "/tæg/", meaning: "nhãn mác / thẻ giá" }, 
                { word: "lap", ipa: "/læp/", meaning: "lòng (phần đùi ngồi)" }
            ],
            sentences: [
                { id: "s1", sentence: "A ram is on the dam.", meaning: "Một con cừu đực ở trên con đập." },
                { id: "s2", sentence: "The ram has a yam.", meaning: "Con cừu đực có một củ khoai mỡ." },
                { id: "s3", sentence: "The jam is on the yam.", meaning: "Mứt ở trên củ khoai mỡ." }
            ]
        };

        // BỘ MÁY PHÁT ÂM THÔNG MINH - TỐC ĐỘ 0.7 CHUẨN SƯ PHẠM
        function playSound(textToRead, element, activeClass) {
            // Tắt âm thanh đang chạy trước đó ngay lập tức để không bị đè tiếng
            window.speechSynthesis.cancel(); 
            
            // Xóa trạng thái kích hoạt cũ trên giao diện
            document.querySelectorAll('.word-card, .play-all-btn, .clickable-word').forEach(el => {
                el.classList.remove('playing', 'playing-word');
            });

            // Nếu có phần tử tương tác, thêm class để tạo hiệu ứng đổi màu viền cho bé biết từ nào đang đọc
            if (element) {
                element.classList.add(activeClass);
            }

            // Loại bỏ ký tự đặc biệt để bộ đọc không bị vấp
            let cleanText = textToRead.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()\/]/g, "");
            let utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = 'en-US'; 
            utterance.rate = 0.7; // CẤU HÌNH TỐC ĐỘ ĐỌC CHẬM 0.7 THEO YÊU CẦU

            utterance.onend = () => {
                if (element) {
                    element.classList.remove(activeClass);
                }
            };

            window.speechSynthesis.speak(utterance);
        }

        // TỰ ĐỘNG BÔI ĐỎ CHỮ A ĐỂ TĂNG NHẬN DIỆN MẶT CHỮ (PHONICS)
        function highlightLetterA(text) {
            return text.split('').map(char => {
                if (char.toLowerCase() === 'a') {
                    return `<span class="highlight-vowel">${char}</span>`;
                }
                return char;
            }).join('');
        }

        // TẠO THẺ TỪ VỰNG TRANG 3
        function loadWords() {
            const grid = document.getElementById('wordsGrid');
            grid.innerHTML = lesson2Data.words.map(item => `
                <div class="word-card" onclick="playSound('${item.word}', this, 'playing')">
                    <div class="word-text">${highlightLetterA(item.word)}</div>
                    <div class="ipa-text">${item.ipa}</div>
                    <div class="meaning-text">${item.meaning}</div>
                </div>
            `).join('');
        }

        // TẠO KHU VỰC LUYỆN ĐỌC CÂU TRANG 4 (ĐỌC ĐA ĐIỂM)
        function loadSentences() {
            const list = document.getElementById('sentencesList');
            
            list.innerHTML = lesson2Data.sentences.map(item => {
                const wordsArray = item.sentence.split(' ');
                
                // Tách từng từ đơn trong câu để gán giọng đọc riêng biệt khi bé chạm tay vào từ đó
                const wordsRowHtml = wordsArray.map(word => {
                    // Làm sạch dấu chấm, dấu phẩy ở cuối từ nếu có
                    const cleanWord = word.replace(/[.,]/g, "");
                    return `
                        <span class="clickable-word" onclick="event.stopPropagation(); playSound('${cleanWord}', this, 'playing-word')">
                            ${highlightLetterA(word)}
                        </span>
                    `;
                }).join('');

                return `
                    <div class="sentence-card">
                        <button class="play-all-btn" onclick="playSound('${item.sentence}', this, 'playing')">
                            🔊 Nghe cả câu
                        </button>
                        <div class="sentence-words-row">${wordsRowHtml}</div>
                        <div class="sentence-translation">${item.meaning}</div>
                    </div>
                `;
            }).join('');
        }

        // HÀM CHUYỂN TAB HỌC TẬP TRỰC QUAN
        function changeTab(tabName) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            window.speechSynthesis.cancel(); // Dừng đọc khi chuyển trang

            if (tabName === 'words') {
                document.getElementById('sectionWords').classList.add('active');
                document.getElementById('tabWords').classList.add('active');
            } else {
                document.getElementById('sectionSentences').classList.add('active');
                document.getElementById('tabSentences').classList.add('active');
            }
        }

        // KHỞI CHẠY KHI TẢI TRANG
        window.onload = () => {
            loadWords();
            loadSentences();
        };
    </script>
</body>
</html>
