<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 2: Short Vowel a /æ/</title>
    <style>
        /* --- GIAO DIỆN CHUẨN ĐỒNG BỘ LESSON 1 --- */
        :root {
            --bg-app: #F5FCFF;
            --header-bg: #FFD166;
            --text-main: #2B2D42;
            --vowel-red: #FF0000; /* Bôi đỏ rực rỡ để nổi bật nguyên âm */
            --btn-word: #4EA8DE;
            --btn-sentence: #FF9F43;
            --border-color: #E2ECEF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            padding-bottom: 60px;
        }

        header {
            background-color: var(--header-bg);
            padding: 20px;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        header h1 {
            color: #118AB2;
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        header p {
            color: #073B4C;
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Thanh Chuyển Tab Học Tập */
        .tab-menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px auto;
            max-width: 600px;
            padding: 0 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid #BDD7EE;
            border-radius: 16px;
            background-color: #E1EDF9;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: #06D6A0;
            color: white;
            border-color: #04b386;
            box-shadow: 0 4px 12px rgba(6, 214, 160, 0.3);
        }

        /* Khung nội dung */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* --- LAYOUT CỐ ĐỊNH CHUẨN: 6 HÀNG x 4 CỘT --- */
        .words-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* Bắt buộc luôn hiển thị đúng 4 cột trên 1 hàng */
            gap: 15px;
            margin-top: 10px;
        }

        /* Hỗ trợ hiển thị mượt mà trên di động nhỏ tránh méo chữ */
        @media (max-width: 650px) {
            .words-grid {
                grid-template-columns: repeat(2, 1fr); 
            }
        }

        .word-card {
            background: white;
            border: 3px solid #E2ECEF;
            border-radius: 24px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .word-card:hover {
            transform: translateY(-5px);
            border-color: var(--btn-word);
        }

        .word-card.playing {
            border-color: var(--vowel-red);
            background-color: #FFEBEF;
        }

        /* --- CẤU TRÚC KHUNG ẢNH MINH HỌA PHÍA TRÊN --- */
        .word-image-container {
            width: 100%;
            height: 110px; /* Chiều cao cân đối giúp layout đều tăm tắp */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            background-color: #F8F9FA;
            border-radius: 14px;
            overflow: hidden;
            border: 1px dashed #D0D8E0;
        }

        .word-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Giữ nguyên tỷ lệ ảnh gốc từ sách, không bị bóp méo */
            padding: 4px;
        }

        .word-text {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            color: #000;
        }

        /* Màu đỏ rực rỡ riêng nguyên âm 'a' */
        .highlight-vowel {
            color: var(--vowel-red) !important;
            font-weight: 800;
        }

        .ipa-text {
            font-size: 1rem;
            color: #666;
            font-style: italic;
            margin-top: 3px;
        }

        /* --- PHẦN 2: LUYỆN ĐỌC CÂU (SENTENCES) --- */
        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sentence-card {
            background: white;
            border: 3px solid #DFF6FF;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .play-all-btn {
            background-color: var(--btn-sentence);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background-color 0.2s;
        }

        .play-all-btn:hover {
            background-color: #e68a2e;
        }

        .play-all-btn.playing {
            background-color: #06D6A0;
        }

        .sentence-words-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 12px;
            margin: 15px 0;
        }

        .clickable-word {
            display: inline-block;
            padding: 6px 14px;
            font-size: 1.6rem;
            font-weight: 600;
            background-color: #F0F4F8;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #D0D8e0;
            transition: all 0.1s;
            user-select: none;
        }

        .clickable-word:hover {
            background-color: #E1E9F0;
        }

        .sentence-translation {
            font-size: 1.1rem;
            color: #777;
            font-style: italic;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Short Vowel a /æ/</h1>
        <p>24 Từ vựng nâng cao & 3 Câu cuối trang 3 🌟</p>
    </header>

    <div class="tab-menu">
        <button class="tab-btn active" id="tabWords" onclick="changeTab('words')">🔤 24 Từ vựng (6 Hàng)</button>
        <button class="tab-btn" id="tabSentences" onclick="changeTab('sentences')">📖 3 Câu cuối trang 3</button>
    </div>

    <div class="container">
        
        <section id="sectionWords" class="content-section active">
            <div class="words-grid" id="wordsGrid">
                </div>
        </section>

        <section id="sectionSentences" class="content-section">
            <div class="sentence-list" id="sentencesList">
                </div>
        </section>

    </div>

    <script>
        // DATA NỘI DUNG CHUẨN XÁC: 24 TỪ VÀ 3 CÂU CUỐI TRANG 3
        // Bạn có thể đổi tên các đường dẫn "image" dưới đây thành tên file ảnh thật trong máy của bạn (Ví dụ: "images/ram.jpg")
        const lesson2Data = {
            words: [
                // Hàng 1
                { word: "ram", ipa: "/ræm/", image: "images/ram.png" }, 
                { word: "jam", ipa: "/dʒæm/", image: "images/jam.png" }, 
                { word: "dam", ipa: "/dæm/", image: "images/dam.png" }, 
                { word: "yam", ipa: "/jæm/", image: "images/yam.png" },
                // Hàng 2
                { word: "fan", ipa: "/fæn/", image: "images/fan.png" }, 
                { word: "man", ipa: "/mæn/", image: "images/man.png" }, 
                { word: "pan", ipa: "/pæn/", image: "images/pan.png" }, 
                { word: "can", ipa: "/kæn/", image: "images/can.png" },
                // Hàng 3
                { word: "dad", ipa: "/dæd/", image: "images/dad.png" }, 
                { word: "pad", ipa: "/pæd/", image: "images/pad.png" }, 
                { word: "bag", ipa: "/bæg/", image: "images/bag.png" }, 
                { word: "rag", ipa: "/ræg/", image: "images/rag.png" },
                // Hàng 4
                { word: "tap", ipa: "/tæp/", image: "images/tap.png" }, 
                { word: "nap", ipa: "/næp/", image: "images/nap.png" }, 
                { word: "map", ipa: "/mæp/", image: "images/map.png" }, 
                { word: "cap", ipa: "/kæp/", image: "images/cap.png" },
                // Hàng 5
                { word: "rat", ipa: "/ræt/", image: "images/rat.png" }, 
                { word: "bat", ipa: "/bæt/", image: "images/bat.png" }, 
                { word: "hat", ipa: "/hæt/", image: "images/hat.png" }, 
                { word: "mat", ipa: "/mæt/", image: "images/mat.png" },
                // Hàng 6
                { word: "van", ipa: "/væn/", image: "images/van.png" }, 
                { word: "sad", ipa: "/sæd/", image: "images/sad.png" }, 
                { word: "tag", ipa: "/tæg/", image: "images/tag.png" }, 
                { word: "lap", ipa: "/læp/", image: "images/lap.png" }
            ],
            // 3 CÂU CUỐI CÙNG TRANG 3
            sentences: [
                { id: "s1", sentence: "A ram is on the dam.", meaning: "Một con cừu đực ở trên con đập." },
                { id: "s2", sentence: "The ram has a yam.", meaning: "Con cừu đực có một củ khoai mỡ." },
                { id: "s3", sentence: "The jam is on the yam.", meaning: "Mứt ở trên củ khoai mỡ." }
            ]
        };

        // BỘ MÁY PHÁT ÂM TIẾNG ANH CHUẨN MỸ - KHÔNG LỖI ĐƯỜNG DẪN
        function playSound(textToRead, element, activeClass) {
            window.speechSynthesis.cancel(); // Dừng ngay âm thanh cũ khi click thao tác mới
            
            document.querySelectorAll('.word-card, .play-all-btn').forEach(el => el.classList.remove('playing'));

            if (element) {
                element.classList.add(activeClass);
            }

            // Lọc văn bản sạch trước khi truyền cho máy đọc nhằm triệt tiêu lỗi phát âm
            let cleanText = textToRead.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()\/]/g, "");
            let utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = 'en-US'; 
            utterance.rate = 0.8; // THIẾT LẬP TỐC ĐỘ ĐỌC 0.8 CHẬM RÃI THEO YÊU CẦU

            utterance.onend = () => {
                if (element) {
                    element.classList.remove(activeClass);
                }
            };

            window.speechSynthesis.speak(utterance);
        }

        // TỰ ĐỘNG BÔI ĐỎ TOÀN BỘ CHỮ A/a MỤC TIÊU
        function highlightLetterA(text) {
            return text.split('').map(char => {
                if (char.toLowerCase() === 'a') {
                    return `<span class="highlight-vowel">${char}</span>`;
                }
                return char;
            }).join('');
        }

        // ĐỔ DỮ LIỆU LÊN GRID (CÓ ẢNH PHÍA TRÊN)
        function loadWords() {
            const grid = document.getElementById('wordsGrid');
            grid.innerHTML = lesson2Data.words.map(item => `
                <div class="word-card" onclick="playSound('${item.word}', this, 'playing')">
                    <div class="word-image-container">
                        <img src="${item.image}" alt="${item.word}" class="word-image" onerror="this.style.display='none'; this.parentNode.innerText='📷'">
                    </div>
                    <div>
                        <div class="word-text">${highlightLetterA(item.word)}</div>
                        <div class="ipa-text">${item.ipa}</div>
                    </div>
                </div>
            `).join('');
        }

        // ĐỔ DỮ LIỆU LUYỆN ĐỌC CÂU ĐA ĐIỂM TƯƠNG TÁC
        function loadSentences() {
            const list = document.getElementById('sentencesList');
            
            list.innerHTML = lesson2Data.sentences.map(item => {
                const wordsArray = item.sentence.split(' ');
                const wordsRowHtml = wordsArray.map(word => {
                    const clean = word.replace(/[.,]/g, "").toLowerCase();
                    return `
                        <span class="clickable-word" onclick="event.stopPropagation(); playSound('${clean}', null, null)">
                            ${highlightLetterA(word)}
                        </span>
                    `;
                }).join('');

                return `
                    <div class="sentence-card">
                        <button class="play-all-btn" onclick="playSound('${item.sentence}', this, 'playing')">
                            🔊 Đọc cả câu
                        </button>
                        <div class="sentence-words-row">${wordsRowHtml}</div>
                        <div class="sentence-translation">${item.meaning}</div>
                    </div>
                `;
            }).join('');
        }

        // ĐIỀU HƯỚNG CHUYỂN TAB QUA LẠI
        function changeTab(tabName) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            window.speechSynthesis.cancel(); 

            if (tabName === 'words') {
                document.getElementById('sectionWords').classList.add('active');
                document.getElementById('tabWords').classList.add('active');
            } else {
                document.getElementById('sectionSentences').classList.add('active');
                document.getElementById('tabSentences').classList.add('active');
            }
        }

        // Chạy chương trình ngay khi nạp xong trang
        window.onload = () => {
            loadWords();
            loadSentences();
        };
    </script>
</body>
</html>
