<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiếng Anh Cô Hà - Lesson 5</title>
    <style>
        :root {
            --primary-color: #00897B;
            --accent-color: #E65100;
            --bg-gradient: linear-gradient(135deg, #FFFDE7 0%, #E0F2F1 100%);
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding: 15px;
            color: #263238;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            max-width: 900px;
            margin: 0 auto;
            background: #FFFFFF;
            border-radius: 30px;
            box-shadow: 0 12px 30px rgba(0, 121, 107, 0.15);
            padding: 25px;
            border: 4px solid #B2DFDB;
        }
        
        /* Header thiết kế theo thương hiệu Cô Hà */
        header {
            text-align: center;
            border-bottom: 3px dashed #80CBC4;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .main-title {
            color: #004D40;
            font-size: 32px;
            font-weight: 900;
            margin: 0 0 5px 0;
            text-shadow: 2px 2px #E0F2F1;
            letter-spacing: 1px;
        }
        .slogan {
            color: #00796B;
            font-size: 16px;
            font-style: italic;
            font-weight: 600;
            margin: 0 0 15px 0;
        }
        .lesson-badge {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(230, 81, 0, 0.3);
        }

        /* Hướng dẫn cho bé */
        .guide-bar {
            background: #E8F5E9;
            border-radius: 15px;
            padding: 10px;
            font-size: 15px;
            color: #2E7D32;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Menu chuyển đổi mục tiêu học */
        .nav-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #E0F2F1;
            color: #00796B;
            box-shadow: 0 4px 0 #B2DFDB;
        }
        .tab-btn.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 0 #004D40;
            transform: translateY(2px);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Khối hiển thị Nhóm Nguyên Âm */
        .vowel-section {
            background: #F9F9F9;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid #E0E0E0;
        }
        .vowel-header {
            font-size: 22px;
            font-weight: bold;
            color: #00796B;
            margin-bottom: 15px;
            text-align: left;
            border-left: 6px solid var(--primary-color);
            padding-left: 10px;
        }

        /* Lưới 24 từ vựng */
        .word-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        @media (min-width: 600px) {
            .word-grid { grid-template-columns: repeat(4, 1fr); }
        }

        /* Card từ vựng cho bé chạm */
        .word-card {
            background: white;
            border: 3px solid #E0F2F1;
            border-radius: 18px;
            padding: 15px 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 0 #E0F2F1;
        }
        .word-card:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .word-card.playing {
            background: #FFF59D;
            border-color: #FBC02D;
        }
        .word-text {
            font-size: 26px;
            font-weight: bold;
            color: #1a237e;
            display: block;
            margin-bottom: 4px;
        }
        .word-ipa {
            font-size: 14px;
            color: #757575;
            font-family: sans-serif;
        }

        /* Phần bài tập luyện đọc câu */
        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .sentence-card {
            background: #FFFDE7;
            border: 3px solid #FFF59D;
            border-radius: 24px;
            padding: 20px;
            text-align: left;
            position: relative;
            box-shadow: 0 5px 0 #FFF9C4;
        }
        .sentence-num {
            background: #FFB300;
            color: white;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 12px;
        }
        
        /* Hiệu ứng đọc tách chữ */
        .sentence-text {
            font-size: 26px;
            line-height: 1.6;
            color: #37474F;
            font-weight: 600;
            margin-bottom: 15px;
            word-wrap: break-word;
        }
        .clickable-word {
            display: inline-block;
            padding: 0 4px;
            margin: 0 2px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .clickable-word:hover {
            background: #FFE082;
            color: #000;
        }
        .clickable-word.active-word {
            background: #FF6D00;
            color: white;
            border-radius: 6px;
            transform: scale(1.1);
        }

        /* Nút phát âm câu to, rõ ràng */
        .btn-speak-sentence {
            background: #311B92;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 0 #1A237E;
        }
        .btn-speak-sentence:active {
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="main-title">BÉ LUYỆN ĐÁNH VẦN TIẾNG ANH</div>
        <div class="slogan">Tiếng anh cô Hà - Nhịp cầu nhỏ bước ra thế giới</div>
        <div class="lesson-badge">Lesson 5: Nguyên âm dài /eɪ/ và /aɪ/</div>
    </header>

    <div class="guide-bar">
        <span>💡 Mẹo cho bé: Ấn vào từ lẻ để nghe phát âm, hoặc bấm nút tím để nghe toàn bộ câu nhé!</span>
    </div>

    <!-- Thanh chuyển đổi danh mục -->
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('words-tab', this)">🔤 24 Từ Vựng</button>
        <button class="tab-btn" onclick="switchTab('sentences-tab', this)">📖 3 Câu Luyện Đọc</button>
    </div>

    <!-- TAP 1: DANH SÁCH TỪ VỰNG -->
    <div id="words-tab" class="tab-content active">
        <!-- NHÓM NGUYÊN ÂM DÀI /ei/ -->
        <div class="vowel-section">
            <div class="vowel-header">Long Vowel A /eɪ/</div>
            <div class="word-grid" id="vowel-a-grid"></div>
        </div>
        
        <!-- NHÓM NGUYÊN ÂM DÀI /ai/ -->
        <div class="vowel-section">
            <div class="vowel-header">Long Vowel I /aɪ/</div>
            <div class="word-grid" id="vowel-i-grid"></div>
        </div>
    </div>

    <!-- TAB 2: BÀI TẬP LUYỆN ĐỌC CÂU -->
    <div id="sentences-tab" class="tab-content">
        <div class="sentence-list" id="sentence-container"></div>
    </div>
</div>

<script>
    // 1. Tổ chức cấu trúc 24 dữ liệu từ vựng theo quy tắc Phonics
    const longVowelA = [
        { word: 'mane', ipa: '/meɪn/' }, { word: 'cane', ipa: '/keɪn/' }, { word: 'tape', ipa: '/teɪp/' }, { word: 'cape', ipa: '/keɪp/' },
        { word: 'game', ipa: '/ɡeɪm/' }, { word: 'cake', ipa: '/keɪk/' }, { word: 'name', ipa: '/neɪm/' }, { word: 'lake', ipa: '/leɪk/' },
        { word: 'wave', ipa: '/weɪv/' }, { word: 'cave', ipa: '/keɪv/' }, { word: 'skate', ipa: '/skeɪt/' }, { word: 'gate', ipa: '/ɡeɪt/' }
    ];

    const longVowelI = [
        { word: 'ripe', ipa: '/raɪp/' }, { word: 'fine', ipa: '/faɪn/' }, { word: 'pine', ipa: '/paɪn/' }, { word: 'kite', ipa: '/kaɪt/' },
        { word: 'lime', ipa: '/laɪm/' }, { word: 'time', ipa: '/taɪm/' }, { word: 'bike', ipa: '/baɪk/' }, { word: 'hike', ipa: '/haɪk/' },
        { word: 'five', ipa: '/faɪv/' }, { word: 'nine', ipa: '/naɪn/' }, { word: 'dive', ipa: '/daɪv/' }, { word: 'line', ipa: '/laɪn/' }
    ];

    // 2. Dữ liệu 3 câu luyện đọc đã được chuẩn hóa chính tả khoa học
    const sentences = [
        { id: 13, text: "The man has tape and a cane." },
        { id: 14, text: "I see a skate in a cave." },
        { id: 15, text: "My kite is fine in the pine." }
    ];

    // Cấu hình âm thanh AI chuẩn giọng trẻ em học tiếng anh (Mỹ)
    function speakWord(text, element = null) {
        window.speechSynthesis.cancel(); // Ngắt âm thanh cũ tức thì
        
        if(element) element.classList.add('playing');
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.8; // Giảm nhẹ tốc độ giúp nghe rõ âm đuôi (Ending Sound)
        
        utterance.onend = () => {
            if(element) element.classList.remove('playing');
        };
        window.speechSynthesis.speak(utterance);
    }

    // Render danh sách từ vựng lên màn hình
    function buildWordGrid(data, gridId) {
        const grid = document.getElementById(gridId);
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.innerHTML = `<span class="word-text">${item.word}</span><span class="word-ipa">${item.ipa}</span>`;
            card.onclick = function() { speakWord(item.word, card); };
            grid.appendChild(card);
        });
    }

    // Render danh sách 3 câu tập đọc kết hợp công nghệ Tách Từ (Word Highlighter)
    function buildSentenceList() {
        const container = document.getElementById('sentence-container');
        sentences.forEach(s => {
            const card = document.createElement('div');
            card.className = 'sentence-card';
            
            // Tách câu thành mảng từ để tạo nút bấm cho từng từ riêng biệt
            const words = s.text.split(' ');
            let wordsHTML = words.map((w, idx) => {
                const cleanWord = w.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,""); // Làm sạch ký tự đặc biệt khi đọc lẻ
                return `<span class="clickable-word" id="word-${s.id}-${idx}" onclick="speakWord('${cleanWord}')">${w}</span>`;
            }).join(' ');

            card.innerHTML = `
                <span class="sentence-num">Câu ${s.id}</span>
                <div class="sentence-text">${wordsHTML}</div>
                <button class="btn-speak-sentence" onclick="speakWholeSentence(${s.id}, '${s.text.replace(/'/g, "\\'")}')">
                    <span>🔊 Nghe cả câu</span>
                </button>
            `;
            container.appendChild(card);
        });
    }

    // Thuật toán chạy màu Highlight đuổi theo giọng đọc AI
    function speakWholeSentence(id, fullText) {
        window.speechSynthesis.cancel(); // Xóa sạch bộ nhớ phát âm cũ
        
        // Hoàn tác mọi highlight đang hiển thị trước đó
        document.querySelectorAll('.clickable-word').forEach(el => el.classList.remove('active-word'));

        const words = fullText.split(' ');
        let currentWordIdx = 0;

        const utterance = new SpeechSynthesisUtterance(fullText);
        utterance.lang = 'en-US';
        utterance.rate = 0.75; // Đọc tốc độ tối ưu để học sinh bắt chước theo (Shadowing)

        // Sự kiện kích hoạt khi AI chuyển sang đọc từ mới
        utterance.onboundary = function(event) {
            if (event.name === 'word') {
                // Xóa highlight của từ vừa đọc xong
                document.querySelectorAll(`.clickable-word`).forEach(el => el.classList.remove('active-word'));
                
                // Bật màu sáng cho từ hiện tại
                const currentWordElement = document.getElementById(`word-${id}-${currentWordIdx}`);
                if (currentWordElement) {
                    currentWordElement.classList.add('active-word');
                    currentWordIdx++;
                }
            }
        };

        // Khi đọc hết câu, tự động tắt màu highlight sau 400ms
        utterance.onend = function() {
            setTimeout(() => {
                document.querySelectorAll('.clickable-word').forEach(el => el.classList.remove('active-word'));
            }, 400);
        };

        window.speechSynthesis.speak(utterance);
    }

    // Hàm chuyển đổi qua lại giữa Tab từ vựng và câu
    function switchTab(tabId, buttonElement) {
        window.speechSynthesis.cancel();
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        buttonElement.classList.add('active');
    }

    // Chạy khởi tạo ứng dụng khi trang web tải xong
    buildWordGrid(longVowelA, 'vowel-a-grid');
    buildWordGrid(longVowelI, 'vowel-i-grid');
    buildSentenceList();
</script>

</body>
</html>
